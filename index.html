<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Garaż 🔧</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1C1C1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Garaż">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* ── Reset & iOS Base ──────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F2F2F7;--card:#FFFFFF;--card2:#F2F2F7;--grouped:#EFEFF4;
  --t1:#000000;--t2:#6C6C70;--t3:#AEAEB2;
  --sep:#C6C6C8;--sep2:#E5E5EA;
  --accent:#3A3499;--accent-bg:#EEEDFe;--accent-border:#AFA9EC;
  --green:#34C759;--red:#FF3B30;--orange:#FF9500;--blue:#007AFF;
  --radius:10px;--radius-lg:13px;--radius-xl:16px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);
  --safe-right:env(safe-area-inset-right,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1C1C1E;--card:#2C2C2E;--card2:#3A3A3C;--grouped:#1C1C1E;
  --t1:#FFFFFF;--t2:#EBEBF5CC;--t3:#EBEBF560;
  --sep:#38383A;--sep2:#48484A;
  --accent:#7B74F0;--accent-bg:#2A2860;--accent-border:#5A54C0;
  --green:#30D158;--red:#FF453A;--orange:#FF9F0A;--blue:#0A84FF;
}}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--t1);font-size:16px;line-height:1.5;
}

/* ── Safe Areas & Layout ───────────────────────────────────────────── */
.app{
  display:flex;flex-direction:column;height:100%;
  padding-top:var(--safe-top);
}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:none}

/* ── Navigation Bar (iOS style) ────────────────────────────────────── */
.navbar{
  background:var(--card);
  border-bottom:0.5px solid var(--sep);
  padding:12px 16px 8px;
  display:flex;align-items:flex-end;gap:8px;
  position:sticky;top:0;z-index:50;
  /* Blur backdrop – matowy efekt jak w iOS */
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  background:rgba(255,255,255,0.82);
}
@media(prefers-color-scheme:dark){
  .navbar{background:rgba(28,28,30,0.82);}
}
.navbar-title{font-size:17px;font-weight:600;flex:1}
.navbar-btn{
  width:34px;height:34px;border-radius:50%;background:var(--card2);
  border:none;color:var(--t2);display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;transition:opacity .15s;flex-none;
}
.navbar-btn:active{opacity:.5}
.navbar-btn.primary{background:var(--accent-bg);color:var(--accent)}

/* ── Large Title ───────────────────────────────────────────────────── */
.large-title{
  font-size:34px;font-weight:700;letter-spacing:.35px;
  padding:8px 20px 4px;
}

/* ── Search Bar (iOS style) ────────────────────────────────────────── */
.searchbar-wrap{padding:6px 16px 10px}
.searchbar{
  display:flex;align-items:center;gap:8px;
  background:var(--card2);border-radius:10px;
  padding:7px 12px;border:none;
}
.searchbar i{color:var(--t3);font-size:16px;flex-none}
.searchbar input{
  background:transparent;border:none;outline:none;
  color:var(--t1);font-size:16px;flex:1;font-family:inherit;
}
.searchbar input::placeholder{color:var(--t3)}

/* ── Segmented Control (iOS style) ────────────────────────────────── */
.segmented{
  display:flex;background:var(--card2);border-radius:9px;padding:2px;
  margin:0 16px 12px;
}
.seg-btn{
  flex:1;padding:6px 8px;border:none;background:transparent;
  color:var(--t2);font-size:13px;font-weight:500;border-radius:7px;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px;
  font-family:inherit;
}
.seg-btn.active{
  background:var(--card);color:var(--t1);
  box-shadow:0 1px 4px rgba(0,0,0,.14),0 0.5px 1px rgba(0,0,0,.08);
}
.seg-btn i{font-size:14px}

/* ── Grouped Table (iOS style) ─────────────────────────────────────── */
.section{margin:0 0 24px}
.section-header{
  font-size:13px;font-weight:400;color:var(--t2);
  padding:0 20px 6px;text-transform:uppercase;letter-spacing:.08em;
  font-size:12.5px;
}
.table-group{
  background:var(--card);border-radius:var(--radius-xl);
  margin:0 16px;overflow:hidden;
}
.table-row{
  display:flex;align-items:center;padding:12px 16px;
  border-bottom:0.5px solid var(--sep2);gap:12px;
  cursor:pointer;position:relative;transition:background .1s;
}
.table-row:last-child{border-bottom:none}
.table-row:active{background:var(--card2)}
.table-row-icon{
  width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-none;
}
.table-row-body{flex:1;min-width:0}
.table-row-title{font-size:16px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.table-row-sub{font-size:13px;color:var(--t2);margin-top:1px}
.table-row-chevron{color:var(--t3);font-size:13px;flex-none}
.table-row-right{display:flex;align-items:center;gap:6px;flex:none}

/* ── Pills / Badges ────────────────────────────────────────────────── */
.badge{
  font-size:12px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;
}
.badge-accent{background:var(--accent-bg);color:var(--accent);border:0.5px solid var(--accent-border)}
.badge-red{background:#FFF0EE;color:var(--red);border:0.5px solid #FFB3AE}
.badge-green{background:#E8FBF0;color:#1A7A3C;border:0.5px solid #86E0A8}
.badge-orange{background:#FFF4E6;color:#8B4800;border:0.5px solid #FFC97A}
.badge-gray{background:var(--card2);color:var(--t2);border:0.5px solid var(--sep)}
@media(prefers-color-scheme:dark){
  .badge-red{background:#4A1008;color:#FF6B6B;border-color:#FF453A40}
  .badge-green{background:#0A3D1F;color:#30D158;border-color:#30D15840}
  .badge-orange{background:#3D1E00;color:#FF9F0A;border-color:#FF9F0A40}
}

/* ── Shelf Card (Szkic view) ───────────────────────────────────────── */
.shelf-card{
  background:var(--card);border-radius:var(--radius-xl);
  margin:0 16px 14px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.07);
}
.shelf-card-header{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;border-bottom:0.5px solid var(--sep2);
  cursor:pointer;
}
.shelf-card-header:active{background:var(--card2)}
.shelf-card-title{font-size:15px;font-weight:600;flex:1}
.shelf-body{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.shelf-row-wrap{
  background:var(--card2);border-radius:10px;padding:8px 10px;
}
.shelf-row-lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px}
.slots{display:flex;gap:6px;flex-wrap:wrap}
.slot{
  height:34px;min-width:44px;max-width:100px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:11.5px;font-weight:600;padding:3px 8px;
  overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  cursor:pointer;position:relative;user-select:none;
  border:0.5px solid transparent;
  transition:transform .1s,opacity .1s;
}
.slot:active{transform:scale(.93);opacity:.75}
.s-loose{background:#F5F4F0;color:#3A3A3A;border-color:#C8C6BE}
.s-box{background:#E3F4EE;color:#0A5B4A;border-color:#68CCB0}
.s-original{background:#E8F0FB;color:#1050A0;border-color:#90BAF0}
.s-custom{background:#FFF0D8;color:#7A4200;border-color:#F5A830}
@media(prefers-color-scheme:dark){
  .s-loose{background:#38383A;color:#C8C8CC;border-color:#58585A}
  .s-box{background:#0D3328;color:#40D0A8;border-color:#40D0A840}
  .s-original{background:#0D2850;color:#5BA8FF;border-color:#5BA8FF40}
  .s-custom{background:#3D2200;color:#F5A830;border-color:#F5A83040}
}
.slot-qty{
  position:absolute;top:-5px;right:-5px;
  background:var(--accent);color:#fff;font-size:9px;font-weight:700;
  border-radius:10px;padding:0 4px;min-width:16px;height:16px;
  display:flex;align-items:center;justify-content:center;
}
.slot-low{
  position:absolute;top:-5px;right:-5px;
  background:var(--red);color:#fff;font-size:9px;font-weight:700;
  border-radius:10px;padding:0 4px;min-width:16px;height:16px;
  display:flex;align-items:center;justify-content:center;
}
.slot-add{
  height:34px;width:34px;border-radius:8px;border:1.5px dashed var(--sep);
  background:transparent;color:var(--t3);font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;
  transition:all .15s;
}
.slot-add:active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.slot-placeholder{
  height:34px;min-width:30px;border-radius:8px;border:1.5px dashed var(--sep2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--t3);padding:2px 5px;flex:none;cursor:pointer;
}
.slot-placeholder:active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}

/* ── Stock View ────────────────────────────────────────────────────── */
.stock-card{
  background:var(--card);border-radius:var(--radius-xl);
  margin:0 16px 14px;overflow:hidden;
}
.stock-item{
  padding:14px 16px;border-bottom:0.5px solid var(--sep2);
}
.stock-item:last-child{border-bottom:none}
.stock-item.low{border-left:3px solid var(--red)}
.stock-item-name{font-size:15px;font-weight:500;margin-bottom:2px}
.stock-item-loc{font-size:12px;color:var(--t2);margin-bottom:10px}
.stock-controls{display:flex;align-items:center;gap:10px}
.qty-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-weight:300;transition:transform .1s;flex-none;font-family:inherit;
}
.qty-btn:active{transform:scale(.88)}
.qty-minus{background:var(--red);color:#fff}
.qty-plus{background:var(--green);color:#fff}
.qty-val{font-size:22px;font-weight:600;min-width:42px;text-align:center}
.qty-val.low{color:var(--red)}
.qty-unit{font-size:13px;color:var(--t2)}
.qty-bar{height:3px;background:var(--sep2);border-radius:2px;margin-top:10px;overflow:hidden}
.qty-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.qty-save-btn{
  margin-left:auto;background:var(--accent-bg);color:var(--accent);
  border:0.5px solid var(--accent-border);border-radius:8px;
  padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  display:none;
}
.qty-save-btn:active{opacity:.7}

/* ── Modal (Sheet style, iOS) ──────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;
  transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-sheet{
  background:var(--card);border-radius:20px 20px 0 0;
  width:100%;max-width:640px;
  max-height:94dvh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .32s cubic-bezier(.36,.07,.19,.97);
  padding-bottom:var(--safe-bottom);
}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{
  width:36px;height:4px;border-radius:2px;background:var(--sep);
  margin:10px auto 4px;flex-none;
}
.modal-header{
  display:flex;align-items:center;padding:12px 16px 8px;
  border-bottom:0.5px solid var(--sep2);flex-none;gap:10px;
}
.modal-header h2{font-size:17px;font-weight:600;flex:1}
.modal-close{
  width:30px;height:30px;border-radius:50%;background:var(--card2);
  border:none;color:var(--t2);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-none;
}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 0 8px}
.modal-footer{
  padding:8px 16px 4px;border-top:0.5px solid var(--sep2);
  display:flex;gap:8px;flex-none;
}
.modal-footer button{flex:1;padding:13px;border-radius:12px;font-size:16px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.btn-cancel{background:var(--card2);color:var(--t1)}
.btn-cancel:active{opacity:.6}
.btn-confirm{background:var(--accent);color:#fff}
.btn-confirm:active{opacity:.8}
.btn-danger-full{background:var(--red);color:#fff}
.btn-danger-full:active{opacity:.8}

/* ── Form Fields ───────────────────────────────────────────────────── */
.form-section{padding:0 16px;margin-bottom:16px}
.form-section-title{
  font-size:12.5px;font-weight:400;color:var(--t2);
  text-transform:uppercase;letter-spacing:.08em;
  padding:0 4px 6px;
}
.form-group{background:var(--card);border-radius:var(--radius-xl);overflow:hidden}
.form-row{
  display:flex;align-items:center;padding:12px 16px;
  border-bottom:0.5px solid var(--sep2);gap:12px;
}
.form-row:last-child{border-bottom:none}
.form-row label{font-size:16px;color:var(--t1);min-width:100px;flex:none}
.form-row input,.form-row select,.form-row textarea{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--t1);font-size:16px;font-family:inherit;text-align:right;
}
.form-row textarea{text-align:left;resize:none}
.form-row select{-webkit-appearance:none;text-align:right}
.form-row input::placeholder,.form-row textarea::placeholder{color:var(--t3)}
.form-row-full{flex-direction:column;align-items:flex-start;gap:6px}
.form-row-full label{min-width:unset}
.form-row-full input,.form-row-full select,.form-row-full textarea{text-align:left;width:100%}

/* Sub-items in form */
.sub-row{
  display:flex;align-items:center;gap:8px;padding:8px 16px;
  border-bottom:0.5px solid var(--sep2);
}
.sub-row:last-child{border-bottom:none}
.sub-row input{background:transparent;border:none;outline:none;color:var(--t1);font-size:15px;font-family:inherit}
.sub-row input.sub-name{flex:1}
.sub-row input.sub-qty{width:52px;text-align:center}
.sub-row input.sub-unit{width:52px;text-align:center;color:var(--t2)}
.sub-del{width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
.sub-del:active{opacity:.7}
.add-sub-row{
  display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;color:var(--accent);
}
.add-sub-row:active{background:var(--card2)}
.add-sub-row span{font-size:16px}

/* Photo */
.photo-row{
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}
.photo-pick{
  display:flex;align-items:center;gap:10px;color:var(--accent);
  background:var(--card2);border-radius:12px;padding:12px 20px;cursor:pointer;
  font-size:16px;
}
.photo-pick input{display:none}
.photo-preview{width:100%;max-height:200px;object-fit:contain;border-radius:12px;border:0.5px solid var(--sep)}

/* Color chips */
.color-chips{display:flex;gap:8px;flex-wrap:wrap;padding:4px 0 4px}
.color-chip{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:12px;
  border:2px solid transparent;transition:transform .1s;
}
.color-chip:active{transform:scale(.85)}
.color-chip.selected{border-color:var(--t1)}
.color-chip.clear{background:var(--card2);color:var(--t3);border:1.5px dashed var(--sep)}

/* ── Detail Sheet ──────────────────────────────────────────────────── */
.detail-photo{width:100%;max-height:220px;object-fit:contain;background:var(--card2)}
.detail-row{
  display:flex;align-items:center;padding:12px 16px;
  border-bottom:0.5px solid var(--sep2);gap:10px;
}
.detail-row:last-child{border-bottom:none}
.detail-label{font-size:15px;color:var(--t2);flex:none;min-width:100px}
.detail-value{font-size:15px;color:var(--t1);text-align:right;flex:1}
.sub-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px;margin:3px;border-radius:8px;
  background:var(--card2);font-size:14px;
}
.sub-chip.low{background:#FFF0EE;color:var(--red)}

/* ── QR ────────────────────────────────────────────────────────────── */
.qr-center{display:flex;flex-direction:column;align-items:center;padding:20px;gap:12px}
.qr-center canvas{border-radius:12px;border:0.5px solid var(--sep)}
.qr-url{font-size:11px;color:var(--t2);text-align:center;word-break:break-all}

/* ── Login Screen ──────────────────────────────────────────────────── */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;background:var(--bg);
}
.login-card{width:100%;max-width:340px}
.login-icon{
  width:72px;height:72px;background:var(--accent);border-radius:18px;
  display:flex;align-items:center;justify-content:center;font-size:34px;color:#fff;
  margin:0 auto 20px;
}
.login-title{font-size:28px;font-weight:700;text-align:center;margin-bottom:6px}
.login-sub{font-size:15px;color:var(--t2);text-align:center;margin-bottom:32px}
.login-input-wrap{
  background:var(--card);border-radius:var(--radius-xl);overflow:hidden;
  margin-bottom:12px;
}
.login-input{
  width:100%;padding:14px 16px;border:none;outline:none;
  background:transparent;color:var(--t1);font-size:17px;font-family:inherit;
}
.login-btn{
  width:100%;padding:14px;background:var(--accent);color:#fff;
  border:none;border-radius:14px;font-size:17px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .15s;
}
.login-btn:active{opacity:.75}
.login-err{font-size:13px;color:var(--red);text-align:center;min-height:20px;margin-top:6px}

/* ── Alert Banner ──────────────────────────────────────────────────── */
.alert-banner{
  margin:0 16px 12px;padding:12px 14px;border-radius:var(--radius-xl);
  background:#FFF0EE;color:var(--red);font-size:14px;font-weight:500;
  display:flex;align-items:center;gap:8px;
  border:0.5px solid #FFB3AE;
}
@media(prefers-color-scheme:dark){.alert-banner{background:#4A1008;border-color:#FF453A40}}

/* ── Empty state ───────────────────────────────────────────────────── */
.empty{padding:48px 20px;text-align:center;color:var(--t3)}
.empty i{font-size:40px;display:block;margin-bottom:12px}
.empty p{font-size:15px}

/* ── Tab Bar (bottom iOS style) ────────────────────────────────────── */
.tabbar{
  display:flex;background:rgba(255,255,255,.92);
  border-top:0.5px solid var(--sep);
  padding:6px 0 calc(6px + var(--safe-bottom));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  flex-none;
}
@media(prefers-color-scheme:dark){.tabbar{background:rgba(28,28,30,.92)}}
.tab-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;padding:4px 0;transition:opacity .1s;
  border:none;background:transparent;color:var(--t3);font-family:inherit;
}
.tab-item:active{opacity:.6}
.tab-item.active{color:var(--accent)}
.tab-item i{font-size:22px}
.tab-item span{font-size:10px;font-weight:500;letter-spacing:.04em}

/* ── FAB ───────────────────────────────────────────────────────────── */
.fab{
  position:fixed;bottom:calc(68px + var(--safe-bottom) + 12px);right:20px;
  width:52px;height:52px;background:var(--accent);color:#fff;
  border:none;border-radius:50%;font-size:26px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(58,52,153,.4);z-index:100;
  transition:transform .15s,box-shadow .15s;
}
.fab:active{transform:scale(.9);box-shadow:0 2px 8px rgba(58,52,153,.3)}

/* ── Position visualizer ────────────────────────────────────────────── */
.pos-slots{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.pslot{width:26px;height:26px;border-radius:5px;border:0.5px solid var(--sep);background:var(--card2);font-size:11px;color:var(--t3);display:flex;align-items:center;justify-content:center}
.pslot.mine{background:#FFF0EE;border-color:#F0997B;color:#712B13;font-weight:600}
.pslot.taken{background:var(--sep2);color:var(--t3)}

/* ── 3D / Manage containers ────────────────────────────────────────── */
.manage-add{
  display:flex;align-items:center;justify-content:center;
  padding:14px 16px;margin:0 16px 12px;
  background:var(--card);border-radius:var(--radius-xl);
  color:var(--accent);font-size:16px;gap:8px;cursor:pointer;font-weight:500;
}
.manage-add:active{background:var(--card2)}
.manage-item-actions{display:flex;gap:6px}
.manage-item-actions button{
  width:34px;height:34px;border-radius:8px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  background:var(--card2);color:var(--t2);
}
.manage-item-actions button:active{opacity:.6}
.manage-item-actions .del{background:#FFF0EE;color:var(--red)}
@media(prefers-color-scheme:dark){.manage-item-actions .del{background:#4A1008}}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════ LOGIN -->
<div id="login-screen" class="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-icon"><i class="ti ti-tool"></i></div>
    <div class="login-title">Garaż</div>
    <div class="login-sub">Wpisz hasło, żeby wejść</div>
    <div class="login-input-wrap">
      <input class="login-input" id="lpwd" type="password" placeholder="Hasło" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="lerr"></div>
    <button class="login-btn" onclick="doLogin()">Zaloguj się</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ MAIN APP -->
<div class="app" id="main-app" style="display:none">
  <!-- Navbar -->
  <div class="navbar" id="navbar">
    <span class="navbar-title" id="navbar-title">Garaż 🔧</span>
    <div style="display:flex;gap:6px;align-items:center">
      <span id="sync-dot" style="width:7px;height:7px;border-radius:50%;background:var(--orange);display:inline-block" title="tryb lokalny"></span>
      <button class="navbar-btn" onclick="exportCSV()" title="Eksport CSV"><i class="ti ti-file-spreadsheet"></i></button>
      <button class="navbar-btn" onclick="doLogout()" title="Wyloguj"><i class="ti ti-logout"></i></button>
    </div>
  </div>

  <!-- Scroll content area -->
  <div class="scroll-area" id="scroll-area">
    <div id="root"></div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tabbar" id="tabbar">
    <button class="tab-item active" id="tab-garage" onclick="setView('garage')">
      <i class="ti ti-layout-board"></i><span>Szkic</span>
    </button>
    <button class="tab-item" id="tab-list" onclick="setView('list')">
      <i class="ti ti-list"></i><span>Lista</span>
    </button>
    <button class="tab-item" id="tab-stock" onclick="setView('stock')">
      <i class="ti ti-package"></i><span>Zapasy</span>
    </button>
    <button class="tab-item" id="tab-manage" onclick="setView('manage')">
      <i class="ti ti-settings-2"></i><span>Elementy</span>
    </button>
  </div>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="openAdd(null,null)" title="Dodaj przedmiot">
    <i class="ti ti-plus"></i>
  </button>
</div>

<!-- ═══════════════════════════════════════════════════════════════ MODAL -->
<div class="modal-overlay" id="modal" onclick="overlayClick(event)">
  <div class="modal-sheet" id="msheet">
    <div class="modal-handle"></div>
    <div class="modal-header" id="mhead-wrap">
      <h2 id="mhead-title">Modal</h2>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" id="mbody"></div>
    <div class="modal-footer" id="mfooter"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ══════════════════════════════════════════════ CONSTANTS
const NORM={loose:'Luzem',box:'Pudełko',original:'Oryg. opak.'};
const NORM_BACK={'Luzem':'loose','Pudełko':'box','Oryginalne opakowanie':'original','Oryg. opak.':'original'};
const CATS=['Narzędzia ręczne','Narzędzia elektryczne','Elektronika','Akcesoria','Materiały','Części','Chemia','Malarstwo','Ogród','Inne'];
const STORAGES=['Luzem','Pudełko','Oryginalne opakowanie','Skrzynka','Worek','Torba','Szuflada'];
const CONTAINER_TYPES=[
  {v:'shelf_unit',l:'Regał (z półkami)',icon:'ti-stack-2'},
  {v:'cabinet',l:'Szafka (z półkami)',icon:'ti-door'},
  {v:'desk',l:'Biurko (bez półek)',icon:'ti-layout-board'},
  {v:'toolbox',l:'Domek narzędziowy',icon:'ti-home'},
  {v:'drawer',l:'Komoda / szuflady',icon:'ti-layout-rows'},
  {v:'flat',l:'Inne bez półek',icon:'ti-box'},
  {v:'other',l:'Inne z półkami',icon:'ti-archive'},
];
const COLORS=['','#5DCAA5','#85B7EB','#EF9F27','#F0997B','#AFA9EC','#f87171','#4ade80','#60a5fa','#e879f9','#facc15'];

// ══════════════════════════════════════════════ STATE
let items=[],nextId=1,view='garage',search='',fSubs=[],fPhoto=null,fEditId=null;
let ws=null,serverMode=false,authToken=null,dragId=null,pendingQty={};
let containers=[
  {id:'R1',name:'Regał 1',type:'shelf_unit',shelves:[{id:'P1',name:'P1',posTotal:null},{id:'P2',name:'P2',posTotal:null},{id:'P3',name:'P3',posTotal:null},{id:'P4',name:'P4',posTotal:null}]},
  {id:'R2',name:'Regał 2',type:'shelf_unit',shelves:[{id:'P1',name:'P1',posTotal:null},{id:'P2',name:'P2',posTotal:null},{id:'P3',name:'P3',posTotal:null},{id:'P4',name:'P4',posTotal:null}]},
  {id:'R3',name:'Regał 3',type:'shelf_unit',shelves:[{id:'P1',name:'P1',posTotal:null},{id:'P2',name:'P2',posTotal:null},{id:'P3',name:'P3',posTotal:null},{id:'P4',name:'P4',posTotal:null}]},
  {id:'R4',name:'Regał 4',type:'shelf_unit',shelves:[{id:'P1',name:'P1',posTotal:null},{id:'P2',name:'P2',posTotal:null},{id:'P3',name:'P3',posTotal:null},{id:'P4',name:'P4',posTotal:null}]},
];
let nextContainerId=5;

// ══════════════════════════════════════════════ HELPERS
function ctypeIcon(v){return CONTAINER_TYPES.find(t=>t.v===v||t.l===v)?.icon||'ti-box';}
function ctypeLabel(v){return CONTAINER_TYPES.find(t=>t.v===v||t.l===v)?.l||v||'Inny';}
function ctypeHasShelves(v){const f=CONTAINER_TYPES.find(t=>t.v===v||t.l===v);if(f)return!['desk','flat'].includes(f.v);const low=(v||'').toLowerCase();return!low.includes('biurk')&&!low.includes('bez półek');}
function getContainer(cid){return containers.find(c=>c.id===cid);}
function getShelf(cid,sid){return getContainer(cid)?.shelves?.find(s=>s.id===sid);}
function itemLocLabel(i){const c=getContainer(i.regal);const cn=c?c.name:i.regal;if(!i.polka||i.polka==='_')return cn;const s=getShelf(i.regal,i.polka);return`${cn} / ${s?s.name:i.polka}`;}
function sLabel(v){return NORM[v]||v||''}
function sSlot(v){return{loose:'s-loose',box:'s-box',original:'s-original'}[v]||'s-custom'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function itemQty(i){return(i.qty!=null&&i.qty!=='')?parseInt(i.qty):null;}
function isLow(i){const q=itemQty(i);if(q!=null&&i.qtyThreshold!=null&&q<=parseInt(i.qtyThreshold))return true;return(i.subitems||[]).some(s=>s.qty!=null&&s.qtyThreshold!=null&&parseInt(s.qty)<=parseInt(s.qtyThreshold));}
function pendingKey(id,subIdx){return subIdx!=null?`${id}_${subIdx}`:`${id}`;}
function stackText(i){if(!i.stackLevel)return'';const lvl=parseInt(i.stackLevel),tot=parseInt(i.stackTotal)||'?';return tot<=3&&lvl<=3?(['dół','środek','góra'][lvl-1]||`poz.${lvl}`)+` z ${tot}`:`poz.${lvl} z ${tot}`;}

// ══════════════════════════════════════════════ STORAGE
function saveToken(t){try{localStorage.setItem('garaz_token',t);}catch(e){}}
function loadToken(){try{return localStorage.getItem('garaz_token');}catch(e){return null;}}
function clearToken(){try{localStorage.removeItem('garaz_token');}catch(e){}}
function lsSave(){try{localStorage.setItem('garaz',JSON.stringify({items,nextId}));}catch(e){}}
function lsLoad(){try{const d=JSON.parse(localStorage.getItem('garaz')||'null');if(d){items=d.items||[];nextId=d.nextId||1;}}catch(e){}}
function lsSaveC(){try{localStorage.setItem('garaz_containers',JSON.stringify({containers,nextContainerId}));}catch(e){}}
function lsLoadC(){try{const d=JSON.parse(localStorage.getItem('garaz_containers')||'null');if(d){containers=d.containers||containers;nextContainerId=d.nextContainerId||nextContainerId;}}catch(e){}}

async function saveContainersToServer(){
  if(serverMode){try{await apiCall('PUT','/api/labels',{containers,nextContainerId});}catch(e){lsSaveC();}}
  else lsSaveC();
}
async function loadContainersFromServer(){
  if(serverMode){try{const d=await apiCall('GET','/api/labels');if(d?.containers){containers=d.containers;nextContainerId=d.nextContainerId||nextContainerId;}}catch(e){lsLoadC();}}
  else lsLoadC();
}

// ══════════════════════════════════════════════ AUTH
async function doLogin(){
  const pwd=document.getElementById('lpwd').value;
  const err=document.getElementById('lerr');err.textContent='';
  if(!pwd){err.textContent='Wpisz hasło.';return;}
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
    if(!r.ok){err.textContent='Złe hasło.';return;}
    authToken=(await r.json()).token;saveToken(authToken);showApp();
  }catch(e){authToken=null;showApp();}
}
function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  lsLoad();lsLoadC();render();tryWS();
  loadContainersFromServer().then(render);
}
function doLogout(){
  clearToken();authToken=null;serverMode=false;
  if(ws){ws.close();ws=null;}
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('lpwd').value='';
}

// ══════════════════════════════════════════════ WEBSOCKET
function setSyncDot(on){
  const d=document.getElementById('sync-dot');
  if(d)d.style.background=on?'var(--green)':'var(--orange)';
}
function tryWS(){
  if(!authToken)return;
  try{
    ws=new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}/?token=${authToken}`);
    ws.onopen=()=>{serverMode=true;setSyncDot(true);};
    ws.onclose=()=>{serverMode=false;setSyncDot(false);ws=null;setTimeout(tryWS,8000);};
    ws.onerror=()=>{ws=null;};
    ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type==='AUTH_ERROR'){doLogout();return;}
      if(m.type==='INIT'){items=m.items;nextId=Math.max(0,...items.map(x=>x.id))+1;render();}
      else if(m.type==='ITEM_ADDED'){items.push(m.item);render();}
      else if(m.type==='ITEM_UPDATED'){const i=items.findIndex(x=>x.id===m.item.id);if(i>-1)items[i]=m.item;render();}
      else if(m.type==='ITEM_DELETED'){items=items.filter(x=>x.id!==m.id);render();}
      else if(m.type==='LABELS_UPDATED'){if(m.containers)containers=m.containers;if(m.nextContainerId)nextContainerId=m.nextContainerId;render();}
    };
  }catch(e){ws=null;}
}

// ══════════════════════════════════════════════ API
async function apiCall(method,path,body){
  const h={'Content-Type':'application/json'};
  if(authToken)h['Authorization']=`Bearer ${authToken}`;
  const r=await fetch(path,{method,headers:h,body:body?JSON.stringify(body):undefined});
  if(r.status===401){doLogout();throw new Error('Sesja wygasła');}
  if(!r.ok)throw new Error(await r.text());
  if(method==='DELETE')return null;
  return r.json();
}
async function doSaveApi(body,editId){
  if(serverMode)return editId?apiCall('PUT',`/api/items/${editId}`,body):apiCall('POST','/api/items',body);
  if(editId){const i=items.findIndex(x=>x.id===editId);if(i>-1)items[i]={...items[i],...body,id:editId,updatedAt:new Date().toISOString()};}
  else items.push({...body,id:nextId++,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
  lsSave();render();
}
async function doDeleteApi(id){
  if(serverMode){await apiCall('DELETE',`/api/items/${id}`);return;}
  items=items.filter(x=>x.id!==id);lsSave();render();
}

// ══════════════════════════════════════════════ MODAL
function showModal(title,bodyHTML,footerHTML){
  document.getElementById('mhead-title').textContent=title;
  document.getElementById('mbody').innerHTML=bodyHTML;
  document.getElementById('mfooter').innerHTML=footerHTML||'';
  const overlay=document.getElementById('modal');
  overlay.style.display='flex';
  requestAnimationFrame(()=>overlay.classList.add('open'));
}
function closeModal(){
  const overlay=document.getElementById('modal');
  overlay.classList.remove('open');
  setTimeout(()=>{overlay.style.display='none';},320);
}
function overlayClick(e){if(e.target===document.getElementById('modal'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// ══════════════════════════════════════════════ RENDER
function render(){
  const q=search.trim().toLowerCase();
  const fi=q?items.filter(i=>[i.name,i.cat,i.storage||'',i.note||'',itemLocLabel(i),(i.subitems||[]).map(s=>s.name).join(' ')].join(' ').toLowerCase().includes(q)):items;
  
  // Update tab bar active
  ['garage','list','stock','manage'].forEach(v=>{
    document.getElementById(`tab-${v}`)?.classList.toggle('active',v===view);
  });
  
  // Hide FAB on stock/manage
  const fab=document.getElementById('fab');
  if(fab)fab.style.display=(['stock','manage'].includes(view))?'none':'flex';

  const root=document.getElementById('scroll-area');
  let html=``;

  // Search bar + segmented only on main views
  html+=buildTopBar();

  if(q){
    html+=buildSearchResults(fi);
  } else if(view==='garage'){
    html+=buildGarage(fi);
  } else if(view==='list'){
    html+=buildList(fi);
  } else if(view==='stock'){
    html+=buildStock();
  } else if(view==='manage'){
    html+=buildManage();
  }

  root.innerHTML=html;
}

function buildTopBar(){
  const lowCount=items.filter(isLow).length;
  return`
  <div style="padding-top:8px">
    <div class="searchbar-wrap">
      <div class="searchbar">
        <i class="ti ti-search"></i>
        <input type="search" placeholder="Szukaj: nazwa, kategoria, lokalizacja…"
          value="${esc(search)}" oninput="search=this.value;render()" autocomplete="off">
        ${search?`<button onclick="search='';render()" style="background:transparent;border:none;color:var(--t3);cursor:pointer;padding:0;font-size:18px">✕</button>`:''}
      </div>
    </div>
    ${!search?`
    <div class="segmented">
      <button class="seg-btn${view==='garage'?' active':''}" onclick="setView('garage')"><i class="ti ti-layout-board"></i> Szkic</button>
      <button class="seg-btn${view==='list'?' active':''}" onclick="setView('list')"><i class="ti ti-list"></i> Lista</button>
      <button class="seg-btn${view==='stock'?' active':''}" onclick="setView('stock')">
        <i class="ti ti-package"></i> Zapasy${lowCount?` <span class="badge badge-red" style="padding:1px 5px">${lowCount}</span>`:''}
      </button>
      <button class="seg-btn${view==='manage'?' active':''}" onclick="setView('manage')"><i class="ti ti-settings-2"></i></button>
    </div>`:``}
  </div>`;
}

function setView(v){view=v;render();}
function onSearch(val){search=val;render();}

// ══════════════════════════════════════════════ GARAGE VIEW
function buildGarage(items){
  if(!items.length&&!containers.length)return`<div class="empty"><i class="ti ti-tool"></i><p>Brak przedmiotów.<br>Naciśnij + żeby dodać.</p></div>`;
  return`<div style="padding-bottom:90px">${containers.map(c=>buildContainerCard(c,items)).join('')}</div>`;
}

function buildContainerCard(c,allItems){
  const ci=allItems.filter(x=>x.regal===c.id);
  const hasShelves=ctypeHasShelves(c.type)&&c.shelves&&c.shelves.length>0;
  return`<div class="shelf-card">
    <div class="shelf-card-header" onclick="openEditContainer('${c.id}')">
      <i class="ti ${ctypeIcon(c.type)}" style="font-size:18px;color:var(--accent)"></i>
      <span class="shelf-card-title">${esc(c.name)}</span>
      <span class="badge badge-gray">${ci.length}</span>
      <i class="ti ti-chevron-right" style="font-size:13px;color:var(--t3)"></i>
    </div>
    ${hasShelves
      ?`<div class="shelf-body">${c.shelves.map(s=>buildShelfRow(c.id,s,allItems)).join('')}</div>`
      :`<div class="shelf-body"><div class="shelf-row-wrap"><div class="slots">${ci.map(i=>renderSlot(i)).join('')}<button class="slot-add" onclick="openAdd('${c.id}','_')">+</button></div></div></div>`}
  </div>`;
}

function buildShelfRow(cid,shelf,allItems){
  const pi=[...allItems.filter(x=>x.regal===cid&&x.polka===shelf.id)].sort((a,b)=>(parseInt(a.posIndex)||999)-(parseInt(b.posIndex)||999));
  const maxTotal=shelf.posTotal||pi.reduce((m,i)=>Math.max(m,parseInt(i.posTotal)||0),0);
  const byPos=new Map();
  pi.forEach(i=>{const k=i.posIndex?parseInt(i.posIndex):null;const key=k!=null?k:`_${i.id}`;if(!byPos.has(key))byPos.set(key,[]);byPos.get(key).push(i);});
  let slots='';
  if(maxTotal>0){
    for(let pos=1;pos<=maxTotal;pos++){
      const g=byPos.get(pos);
      if(!g)slots+=`<div class="slot-placeholder" onclick="openAdd('${cid}','${shelf.id}',${pos},${maxTotal})">+${pos}</div>`;
      else slots+=renderSlot(g[0]);
    }
    [...byPos.entries()].filter(([k])=>typeof k==='string'&&k.startsWith('_')).forEach(([,g])=>{g.forEach(i=>slots+=renderSlot(i));});
  } else {
    pi.forEach(i=>{slots+=renderSlot(i);});
  }
  return`<div class="shelf-row-wrap">
    <div class="shelf-row-lbl">${esc(shelf.name)}${shelf.posTotal?` · ${shelf.posTotal} miejsc`:''}</div>
    <div class="slots">${slots}<button class="slot-add" onclick="openAdd('${cid}','${shelf.id}')">+</button></div>
  </div>`;
}

function renderSlot(i){
  const lbl=i.name.length>13?i.name.slice(0,12)+'…':i.name;
  const q=itemQty(i);const low=isLow(i);
  const badge=q!=null?`<span class="${low?'slot-low':'slot-qty'}">${q}</span>`:'';
  const cls=i.customColor?'slot':`slot ${sSlot(i.storage)}`;
  const style=i.customColor?`style="background:${i.customColor};border-color:${i.customColor};color:#fff"`:'';
  return`<div class="${cls}" ${style} onclick="openDetail(${i.id})">${badge}${esc(lbl)}</div>`;
}

// ══════════════════════════════════════════════ LIST VIEW
function buildList(items){
  const sorted=[...items].sort((a,b)=>a.name.localeCompare(b.name,'pl'));
  if(!sorted.length)return`<div class="empty"><i class="ti ti-list"></i><p>Brak przedmiotów.</p></div>`;
  // Group by category
  const cats={};
  sorted.forEach(i=>{(cats[i.cat]||(cats[i.cat]=[])).push(i);});
  let html=`<div style="padding-bottom:90px">`;
  Object.entries(cats).forEach(([cat,its])=>{
    html+=`<div class="section">
      <div class="section-header">${esc(cat)}</div>
      <div class="table-group">
        ${its.map(i=>listRow(i)).join('')}
      </div>
    </div>`;
  });
  return html+`</div>`;
}

function buildSearchResults(fi){
  if(!fi.length)return`<div class="empty"><i class="ti ti-search"></i><p>Brak wyników dla „${esc(search)}"</p></div>`;
  return`<div style="padding:0 0 90px">
    <div class="section-header" style="padding:8px 20px">${fi.length} wyników</div>
    <div class="table-group" style="margin:0 16px">
      ${fi.map(i=>listRow(i)).join('')}
    </div>
  </div>`;
}

function listRow(i){
  const q=itemQty(i);const low=isLow(i);
  const sub=(i.subitems||[]).length;
  return`<div class="table-row" onclick="openDetail(${i.id})">
    <div class="table-row-icon" style="background:${i.customColor||'var(--accent-bg)'}">
      <i class="ti ti-tool" style="color:${i.customColor?'#fff':'var(--accent)'}"></i>
    </div>
    <div class="table-row-body">
      <div class="table-row-title">${esc(i.name)}</div>
      <div class="table-row-sub">${esc(itemLocLabel(i))}${sub?` · ${sub} poz.`:''}</div>
    </div>
    <div class="table-row-right">
      ${q!=null?`<span class="badge ${low?'badge-red':'badge-accent'}">${q}${i.qtyUnit?' '+esc(i.qtyUnit):''}</span>`:''}
      <i class="ti ti-chevron-right table-row-chevron"></i>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════ STOCK VIEW
function buildStock(){
  const tracked=[];
  items.forEach(i=>{
    if(itemQty(i)!=null)tracked.push({item:i,name:i.name,qty:parseInt(i.qty),unit:i.qtyUnit||'',threshold:i.qtyThreshold!=null?parseInt(i.qtyThreshold):null,low:isLow(i),id:i.id,subIdx:null});
    (i.subitems||[]).forEach((s,si)=>{
      if(s.qty!=null&&s.qty!==''){
        const low=s.qtyThreshold!=null&&parseInt(s.qty)<=parseInt(s.qtyThreshold);
        tracked.push({item:i,name:`${i.name} → ${s.name}`,qty:parseInt(s.qty),unit:s.unit||'',threshold:s.qtyThreshold!=null?parseInt(s.qtyThreshold):null,low,id:i.id,subIdx:si});
      }
    });
  });
  if(!tracked.length)return`<div class="empty" style="padding-bottom:90px"><i class="ti ti-package"></i><p>Brak śledzonych zapasów.<br>Dodaj ilość do przedmiotu.</p></div>`;
  const low=tracked.filter(x=>x.low),ok=tracked.filter(x=>!x.low);
  let html=`<div style="padding-bottom:90px">`;
  if(low.length)html+=`<div class="alert-banner"><i class="ti ti-alert-triangle"></i> ${low.length} pozycj${low.length===1?'a':'e'} poniżej progu!</div>`;
  if(low.length)html+=`<div class="section"><div class="section-header">⚠ Niski stan</div><div class="stock-card">${low.map(t=>stockRow(t)).join('')}</div></div>`;
  if(ok.length)html+=`<div class="section"><div class="section-header">Zapasy</div><div class="stock-card">${ok.map(t=>stockRow(t)).join('')}</div></div>`;
  return html+`</div>`;
}

function stockRow(t){
  const pct=t.threshold?Math.min(100,Math.round(t.qty/t.threshold*100)):null;
  const key=pendingKey(t.id,t.subIdx);
  const si=t.subIdx!=null?t.subIdx:'null';
  return`<div class="stock-item${t.low?' low':''}">
    <div class="stock-item-name">${esc(t.name)}</div>
    <div class="stock-item-loc">${esc(itemLocLabel(t.item))}${t.threshold!=null?' · próg: '+t.threshold+' '+(t.unit||''):''}</div>
    <div class="stock-controls">
      <button class="qty-btn qty-minus" onclick="adjustQty(${t.id},${si},-1)">−</button>
      <span id="qty-display-${key}" class="qty-val${t.low?' low':''}">${t.qty}</span>
      ${t.unit?`<span class="qty-unit">${esc(t.unit)}</span>`:''}
      <button class="qty-btn qty-plus" onclick="adjustQty(${t.id},${si},1)">+</button>
      <button id="save-qty-${key}" class="qty-save-btn" onclick="saveQtyChanges(${t.id})">
        <i class="ti ti-device-floppy"></i> Zapisz
      </button>
    </div>
    ${pct!=null?`<div class="qty-bar"><div class="qty-bar-fill" style="width:${pct}%;background:${t.low?'var(--red)':'var(--green)'}"></div></div>`:''}
  </div>`;
}

function adjustQty(id,subIdx,delta){
  const i=items.find(x=>x.id===id);if(!i)return;
  const key=pendingKey(id,subIdx);
  let cur;
  if(subIdx!=null){cur=pendingQty[key]!=null?pendingQty[key]:(parseInt((i.subitems||[])[subIdx]?.qty)||0);}
  else{cur=pendingQty[key]!=null?pendingQty[key]:(parseInt(i.qty)||0);}
  pendingQty[key]=Math.max(0,cur+delta);
  const el=document.getElementById(`qty-display-${key}`);
  if(el){el.textContent=pendingQty[key];el.style.color='var(--orange)';}
  const saveBtn=document.getElementById(`save-qty-${key}`);
  if(saveBtn)saveBtn.style.display='inline-flex';
}

async function saveQtyChanges(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  let body={...i};
  const mainKey=pendingKey(id,null);
  if(pendingQty[mainKey]!=null)body.qty=pendingQty[mainKey];
  const subs=[...(i.subitems||[])];
  subs.forEach((s,si)=>{const k=pendingKey(id,si);if(pendingQty[k]!=null)subs[si]={...s,qty:pendingQty[k]};});
  body.subitems=subs;
  try{
    await doSaveApi(body,id);
    Object.keys(pendingQty).filter(k=>k===String(id)||k.startsWith(`${id}_`)).forEach(k=>delete pendingQty[k]);
    render();
  }catch(e){alert('Błąd zapisu: '+e.message);}
}

async function doAddContainer(){
  const name=document.getElementById('cn-name').value.trim();
  if(!name){document.getElementById('cn-name').focus();return;}
  const type=document.getElementById('cn-type').value;

  const id=`C${nextContainerId++}`;
  const shelves=hasShelves?Array.from({length:shelfCount},(_,i)=>({id:`P${i+1}`,name:`P${i+1}`,posTotal:null})):[];
  containers.push({id,name,type,shelves});
  await saveContainersToServer();
  closeModal();setView('garage');
}

function openEditContainer(cid){
  const c=getContainer(cid);if(!c)return;
  const hasShelves=ctypeHasShelves(c.type);
  showModal(`Edytuj: ${c.name}`,`

      <div class="form-section-title">Szczegóły</div>
      <div class="form-group">
        <div class="form-row">
          <label>Nazwa</label>
          <input id="ce-name" value="${esc(c.name)}">
        </div>
        <div class="form-row">
          <label>Typ</label>
          <select id="ce-type">

          </select>
        </div>
      </div>
    </div>
    ${hasShelves?`
    <div class="form-section">
      <div class="form-section-title">Półki</div>
      <div class="form-group">
        ${(c.shelves||[]).map((s,si)=>`

async function doEditContainer(cid){
  const c=getContainer(cid);if(!c)return;
  c.name=document.getElementById('ce-name').value.trim()||c.name;
  const typeVal=document.getElementById('ce-type').value;
  c.type=typeVal||c.type;
  if(!ctypeHasShelves(c.type))c.shelves=[];
  await saveContainersToServer();
  closeModal();render();
}

function openEditShelf(cid,si){
  const c=getContainer(cid);if(!c)return;
  const s=c.shelves[si];if(!s)return;
  showModal(`Edytuj półkę: ${s.name}`,`
    <div class="form-section">
      <div class="form-group">
        <div class="form-row">
          <label>Nazwa</label>
          <input id="se-name" value="${esc(s.name)}" placeholder="np. Górna">
        </div>
        <div class="form-row">
          <label>Miejsc (siatka)</label>
          <input id="se-total" type="number" min="0" value="${s.posTotal||''}" placeholder="zostaw puste">
        </div>
      </div>
    </div>
  `,`<button class="btn-cancel" onclick="openEditContainer('${cid}')">Wróć</button>
     <button class="btn-confirm" onclick="doEditShelf('${cid}',${si})">Zapisz</button>`);
}
async function doEditShelf(cid,si){
  const c=getContainer(cid);if(!c)return;
  c.shelves[si].name=document.getElementById('se-name').value.trim()||c.shelves[si].name;
  c.shelves[si].posTotal=parseInt(document.getElementById('se-total').value)||null;
  await saveContainersToServer();openEditContainer(cid);
}
async function addShelf(cid){
  const c=getContainer(cid);if(!c)return;
  const n=c.shelves.length+1;
  c.shelves.push({id:`P${n}`,name:`P${n}`,posTotal:null});
  await saveContainersToServer();openEditContainer(cid);
}
async function deleteShelf(cid,si){
  const c=getContainer(cid);if(!c)return;
  const s=c.shelves[si];
  const count=items.filter(x=>x.regal===cid&&x.polka===s.id).length;
  if(count>0&&!confirm(`Na tej półce jest ${count} przedmiotów. Kontynuować?`))return;
  c.shelves.splice(si,1);await saveContainersToServer();openEditContainer(cid);
}
function confirmDeleteContainer(cid){
  const c=getContainer(cid);if(!c)return;
  const count=items.filter(x=>x.regal===cid).length;
  if(!confirm(`Usunąć „${c.name}"?${count?` Element zawiera ${count} przedmiotów.`:''}`))return;
  containers=containers.filter(x=>x.id!==cid);saveContainersToServer();closeModal();render();
}
async function moveContainer(cid,dir){
  const idx=containers.findIndex(c=>c.id===cid);if(idx<0)return;
  const ni=idx+dir;if(ni<0||ni>=containers.length)return;
  [containers[idx],containers[ni]]=[containers[ni],containers[idx]];
  await saveContainersToServer();render();
}

function updateColorChips(selected){
  document.querySelectorAll('.color-chip').forEach((el,i)=>{

}

function updateFormShelves(){
  const cid=document.getElementById('fr').value;
  const c=getContainer(cid);
  const wrap=document.getElementById('fs-wrap');if(!wrap)return;
  const hasShelves=ctypeHasShelves(c?.type||'shelf_unit')&&(c?.shelves||[]).length>0;
  wrap.innerHTML=hasShelves
    ?`<div class="form-row"><label>Półka</label><select id="fp">${(c.shelves||[]).map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select></div>`
    :'';
  refreshPos();
}

function refreshPos(){
  const t=parseInt(document.getElementById('fpt')?.value)||0;
  const m=parseInt(document.getElementById('fpi')?.value)||0;
  const cid=document.getElementById('fr')?.value;
  const sid=document.getElementById('fp')?.value;
  const w=document.getElementById('pospreview');if(!w)return;
  if(!t){w.innerHTML='';return;}
  const occ=new Set(items.filter(x=>x.regal===cid&&x.polka===sid&&x.id!==fEditId&&x.posIndex).map(x=>parseInt(x.posIndex)));
  let s='';
  for(let i=1;i<=Math.min(t,16);i++){const im=i===m,tk=!im&&occ.has(i);s+=`<div class="pslot${im?' mine':tk?' taken':''}">${i}</div>`;}
  w.innerHTML=`<div class="pos-slots">${s}</div>`;
}

function subRow(s,idx){
  return`<div class="sub-row">
    <input class="sub-name" placeholder="nazwa…" value="${esc(s.name||'')}" oninput="fSubs[${idx}].name=this.value">
    <input class="sub-qty" type="number" min="0" placeholder="ile" value="${s.qty??''}" oninput="fSubs[${idx}].qty=this.value===''?null:Number(this.value)">
    <input class="sub-unit" placeholder="szt" value="${esc(s.unit||'')}" oninput="fSubs[${idx}].unit=this.value">

function addSub(){
  fSubs.push({name:'',qty:null,unit:'',qtyThreshold:null});

  const d=document.createElement('div');d.innerHTML=subRow(fSubs[fSubs.length-1],fSubs.length-1);l.appendChild(d.firstElementChild);

function removeSub(idx){fSubs.splice(idx,1);const l=document.getElementById('subs');if(l)l.innerHTML=fSubs.map((s,i)=>subRow(s,i)).join('');}

function handlePhoto(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{fPhoto=ev.target.result;rePhoto();};r.readAsDataURL(f);
}
function rePhoto(){
  const w=document.getElementById('phtw');if(!w)return;
  w.innerHTML=fPhoto
    ?`<div style="width:100%;position:relative">
        <img src="${fPhoto}" class="photo-preview">
        <button onclick="fPhoto=null;rePhoto()" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer">✕</button>
      </div>`
    :`<label class="photo-pick">
        <i class="ti ti-camera" style="font-size:22px"></i>
        Zrób zdjęcie lub wybierz
        <input type="file" accept="image/*" capture="environment" onchange="handlePhoto(event)">
      </label>`;
}

async function doSave(){
  const name=document.getElementById('fn').value.trim();
  if(!name){document.getElementById('fn').focus();return;}
  const rawS=document.getElementById('fs').value.trim();
  const storage=NORM_BACK[rawS]||rawS||'loose';
  const qtyVal=document.getElementById('fqty').value;
  const thrVal=document.getElementById('fqthr').value;
  const polkaEl=document.getElementById('fp');
  const body={name,
    cat:document.getElementById('fc').value.trim()||'Inne',
    regal:document.getElementById('fr').value,
    polka:polkaEl?polkaEl.value:'_',
    storage,customColor:fColorPick||null,
    posIndex:parseInt(document.getElementById('fpi').value)||null,
    posTotal:parseInt(document.getElementById('fpt').value)||null,
    stackLevel:null,stackTotal:null,
    qty:qtyVal===''?null:parseInt(qtyVal),
    qtyUnit:document.getElementById('fqunit').value.trim()||null,
    qtyThreshold:thrVal===''?null:parseInt(thrVal),
    note:document.getElementById('fnote').value.trim(),
    subitems:fSubs.filter(s=>s.name.trim()),
    photo:fPhoto};
  try{await doSaveApi(body,fEditId);closeModal();}catch(e){alert('Błąd: '+e.message);}
}
async function doDelete(id){
  if(!confirm('Usunąć ten przedmiot?'))return;
  await doDeleteApi(id);closeModal();
}

// ══════════════════════════════════════════════ DETAIL

  const i=items.find(x=>x.id===id);if(!i)return;
  const sub=(i.subitems||[]);
  const q=itemQty(i);const low=isLow(i);
  showModal(i.name,`
    ${i.photo?`<img src="${i.photo}" class="detail-photo" alt="">`:''}
    <div class="form-section" style="padding-top:12px">
      <div class="form-group">
        <div class="detail-row">
          <span class="detail-label">Lokalizacja</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="badge badge-accent">${esc(itemLocLabel(i))}</span>
            <button onclick="openMove(${id})" style="background:var(--card2);border:none;color:var(--accent);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:13px;font-family:inherit">Przesuń</button>
          </div>
        </div>
        <div class="detail-row"><span class="detail-label">Kategoria</span><span class="detail-value">${esc(i.cat)}</span></div>
        <div class="detail-row"><span class="detail-label">Przechow.</span><span class="detail-value">${esc(sLabel(i.storage))}</span></div>
        ${i.note?`<div class="detail-row"><span class="detail-label">Notatka</span><span class="detail-value" style="font-size:13px">${esc(i.note)}</span></div>`:''}
        ${i.posIndex&&i.posTotal?`<div class="detail-row"><span class="detail-label">Pozycja</span><span class="detail-value">${i.posIndex} z ${i.posTotal}</span></div>`:''}
      </div>
    </div>
    ${q!=null?`
    <div class="form-section">
      <div class="form-section-title">Stan</div>
      <div class="form-group">
        <div class="stock-item" style="border-radius:0">
          <div class="stock-controls">
            <button class="qty-btn qty-minus" onclick="adjustQty(${id},null,-1)">−</button>
            <span id="qty-display-${id}" class="qty-val${low?' low':''}">${q}</span>
            ${i.qtyUnit?`<span class="qty-unit">${esc(i.qtyUnit)}</span>`:''}
            <button class="qty-btn qty-plus" onclick="adjustQty(${id},null,1)">+</button>
            <button id="save-qty-${id}" class="qty-save-btn" onclick="saveQtyChanges(${id})"><i class="ti ti-device-floppy"></i> Zapisz</button>
          </div>
          ${i.qtyThreshold!=null?`<div style="font-size:12px;color:var(--t2);margin-top:6px">próg alertu: ${i.qtyThreshold}</div>`:''}
        </div>
      </div>
    </div>`:``}
    ${sub.length?`
    <div class="form-section">
      <div class="form-section-title">Zawartość (${sub.length})</div>
      <div class="form-group">
        ${sub.map((s,si)=>{
          const sq=s.qty!=null&&s.qty!==''?parseInt(s.qty):null;
          const slow=s.qtyThreshold!=null&&sq!=null&&sq<=parseInt(s.qtyThreshold);
          const key=pendingKey(id,si);
          return`<div class="detail-row" style="flex-wrap:wrap;gap:8px">
            <span class="sub-chip${slow?' low':''}">${esc(s.name)}</span>
            ${sq!=null?`
            <button class="qty-btn qty-minus" style="width:28px;height:28px;font-size:16px" onclick="adjustQty(${id},${si},-1)">−</button>
            <span id="qty-display-${key}" style="font-size:15px;font-weight:600;min-width:24px;text-align:center">${sq}</span>
            ${s.unit?`<span style="font-size:12px;color:var(--t2)">${esc(s.unit)}</span>`:''}
            <button class="qty-btn qty-plus" style="width:28px;height:28px;font-size:16px" onclick="adjustQty(${id},${si},1)">+</button>
            <button id="save-qty-${key}" class="qty-save-btn" onclick="saveQtyChanges(${id})"><i class="ti ti-device-floppy"></i></button>`
            :(s.unit?`<span style="font-size:12px;color:var(--t2)">${esc(s.unit)}</span>`:'')}
          </div>`;
        }).join('')}
        <div class="add-sub-row" onclick="addSubQuick(${id})">
          <i class="ti ti-plus" style="font-size:18px"></i>
          <span>Dodaj pozycję</span>
        </div>
      </div>
    </div>`:``}
    <div style="height:8px"></div>
  `,`<button class="btn-cancel" onclick="showQR(${id})"><i class="ti ti-qrcode"></i> QR</button>
     <button class="btn-confirm" onclick="openEdit(${id})"><i class="ti ti-edit"></i> Edytuj</button>`);
}

async function addSubQuick(id){
  const name=prompt('Nazwa nowej pozycji:');if(!name?.trim())return;
  const i=items.find(x=>x.id===id);if(!i)return;
  const subs=[...(i.subitems||[]),{name:name.trim(),qty:null,unit:'',qtyThreshold:null}];
  await doSaveApi({...i,subitems:subs},id);
  openDetail(id);
}

// ══════════════════════════════════════════════ MOVE
function openMove(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const selC=containers.map(c=>`<option value="${c.id}"${c.id===i.regal?' selected':''}>${esc(c.name)}</option>`).join('');
  const curC=getContainer(i.regal);
  const shelves=curC?.shelves||[];
  showModal(`Przesuń: ${i.name}`,`
    <div class="form-section">
      <div class="form-section-title">Nowa lokalizacja</div>
      <div class="form-group">
        <div class="detail-row"><span class="detail-label">Teraz</span><span class="badge badge-gray">${esc(itemLocLabel(i))}</span></div>
        <div class="form-row"><label>Element</label><select id="mv-r" onchange="updateMoveShelf(${id})">${selC}</select></div>
        <div id="mv-shelf-wrap">${shelves.length?`<div class="form-row"><label>Półka</label><select id="mv-p">${shelves.map(s=>`<option value="${s.id}"${s.id===i.polka?' selected':''}>${esc(s.name)}</option>`).join('')}</select></div>`:''}
        </div>
      </div>
    </div>
  `,`<button class="btn-cancel" onclick="closeModal()">Anuluj</button>

}
function updateMoveShelf(itemId){
  const cid=document.getElementById('mv-r').value;
  const c=getContainer(cid);
  const wrap=document.getElementById('mv-shelf-wrap');if(!wrap)return;
  wrap.innerHTML=c?.shelves?.length
    ?`<div class="form-row"><label>Półka</label><select id="mv-p">${c.shelves.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select></div>`
    :'';
}
async function doMove(id){
  const regal=document.getElementById('mv-r').value;
  const polka=document.getElementById('mv-p')?.value||'_';
  const i=items.find(x=>x.id===id);if(!i)return;
  try{await doSaveApi({...i,regal,polka},id);closeModal();}catch(e){alert('Błąd: '+e.message);}
}

// ══════════════════════════════════════════════ QR
function showQR(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const url=`${location.origin}${location.pathname}?item=${id}`;
  showModal(`QR: ${i.name}`,`
    <div class="qr-center">
      <div id="qr-canvas"></div>
      <div class="qr-url">${esc(url)}</div>
      <div style="font-size:12px;color:var(--t2)">Zeskanuj → otwiera szczegóły</div>
    </div>
    <div class="form-section">
      <div class="form-group">
        <div class="detail-row"><span class="detail-label">Przedmiot</span><span class="detail-value">${esc(i.name)}</span></div>
        <div class="detail-row"><span class="detail-label">Lokalizacja</span><span class="detail-value">${esc(itemLocLabel(i))}</span></div>
      </div>
    </div>
  `,`<button class="btn-cancel" onclick="printQR(${id})"><i class="ti ti-printer"></i> Drukuj</button>
     <button class="btn-confirm" onclick="closeModal()">Zamknij</button>`);
  setTimeout(()=>{
    const el=document.getElementById('qr-canvas');
    if(el&&typeof QRCode!=='undefined'){new QRCode(el,{text:url,width:200,height:200,colorDark:'#1a1a18',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}
  },50);
}
function printQR(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const url=`${location.origin}${location.pathname}?item=${id}`;
  const canvas=document.querySelector('#qr-canvas canvas');
  const qrDataUrl=canvas?canvas.toDataURL():'';
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>QR ${i.name}</title>
    <style>body{font-family:-apple-system,sans-serif;padding:20px;text-align:center}.label{border:1.5px solid #ccc;border-radius:12px;padding:16px;max-width:220px;display:inline-block}.name{font-size:16px;font-weight:700;margin:10px 0 4px}.loc{font-size:12px;color:#666}.url{font-size:9px;color:#999;word-break:break-all;margin-top:8px}@media print{body{padding:0}}</style>
  </head><body><div class="label">${qrDataUrl?`<img src="${qrDataUrl}" width="160" height="160">`:''}
    <div class="name">${i.name}</div><div class="loc">${itemLocLabel(i)}</div>
    <div class="url">${url}</div></div>
    <script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

// ══════════════════════════════════════════════ CSV EXPORT
function exportCSV(){
  const h='ID,Nazwa,Kategoria,Lokalizacja,Element,Półka,Pozycja,Miejsc,Ilość,Jednostka,Próg,Przechowywanie,Notatka,Podpozycje\n';
  const rows=items.map(i=>{
    const sub=(i.subitems||[]).map(s=>`${s.name}${s.qty!=null?' x'+s.qty:''}${s.unit?' '+s.unit:''}`).join(' | ');
    return[i.id,`"${(i.name||'').replace(/"/g,'""')}"`,`"${(i.cat||'').replace(/"/g,'""')}"`,`"${itemLocLabel(i).replace(/"/g,'""')}"`,i.regal,i.polka,i.posIndex||'',i.posTotal||'',i.qty??'',i.qtyUnit||'',i.qtyThreshold??'',`"${(i.storage||'').replace(/"/g,'""')}"`,`"${(i.note||'').replace(/"/g,'""')}"`,`"${sub.replace(/"/g,'""')}"`].join(',');
  });
  const blob=new Blob(['\uFEFF'+h+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='garaz.csv';a.click();
}

// ══════════════════════════════════════════════ ITEM LINK
function handleItemLink(){
  const params=new URLSearchParams(location.search);
  const id=parseInt(params.get('item'));
  if(id&&items.find(x=>x.id===id)){setTimeout(()=>openDetail(id),300);history.replaceState(null,'',location.pathname);}
}

// ══════════════════════════════════════════════ BOOT
(async function boot(){
  lsLoad();lsLoadC();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  render();
  const saved=loadToken();
  try{
    const r=await fetch('/api/items',{headers:saved?{'Authorization':`Bearer ${saved}`}:{},signal:AbortSignal.timeout(2000)});
    if(r.status===401){
      document.getElementById('main-app').style.display='none';
      document.getElementById('login-screen').style.display='flex';
      return;
    }
    if(r.ok&&saved){
      authToken=saved;
      items=await r.json();
      nextId=Math.max(0,...items.map(x=>x.id))+1;
      await loadContainersFromServer();
      render();tryWS();handleItemLink();
    }
  }catch(e){}
  if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
  const params=new URLSearchParams(location.search);
  if(params.get('action')==='add'){setTimeout(()=>openAdd(null,null),400);}
})();
</script>
