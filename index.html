<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garaż 🔧</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3C3489">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Garaż">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f5;--card:#fff;--card2:#f1efe8;
  --t1:#1a1a18;--t2:#6b6b67;--t3:#9e9e9a;
  --b1:#c8c6be;--b2:#d4d2ca;--b3:#e8e6de;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--card:#252523;--card2:#2c2c2a;
  --t1:#f0ede8;--t2:#9e9e9a;--t3:#6b6b67;
  --b1:#4a4a47;--b2:#3a3a37;--b3:#313130;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:0.5px solid var(--b1);background:var(--card);color:var(--t1);border-radius:var(--radius);padding:6px 13px;font-size:13px}
button:hover{background:var(--card2)}
button:active{transform:scale(.98)}
input,select,textarea{font-family:inherit;font-size:13px;color:var(--t1);background:var(--card);border:0.5px solid var(--b1);border-radius:var(--radius);padding:6px 10px;outline:none;width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#7f77dd}
textarea{resize:vertical}
.app{max-width:1200px;margin:0 auto;padding:1rem}
header{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
header h1{font-size:17px;font-weight:500;flex:1}
.status{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex:none}
.dot.off{background:#f59e0b}
.topbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.topbar input{flex:1;min-width:180px}
.tabs{display:flex;border:0.5px solid var(--b3);border-radius:var(--radius);overflow:hidden;width:fit-content;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:6px 14px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--t2);border-radius:0;display:flex;align-items:center;gap:5px}
.tab.active{background:var(--card2);color:var(--t1);font-weight:500}
.btn-primary{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;font-weight:500}
.btn-primary:hover{background:#CECBF6}
.btn-danger{color:#A32D2D;border-color:#F09595}
.btn-danger:hover{background:#FCEBEB}
.btn-move{background:#E1F5EE;color:#085041;border-color:#5DCAA5;font-size:12px;padding:4px 10px}
.btn-move:hover{background:#9FE1CB}
/* SZKIC */
/* Poziomy: 2 rzędy po 2 regały — albo 4 w jednym rzędzie na szerokim ekranie */
.garage{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* Pionowy: każdy kontener na pełną szerokość, półki obok siebie */
.garage.vertical{grid-template-columns:1fr;gap:12px}
.garage.vertical .shelf-unit{display:grid;grid-template-columns:200px 1fr;align-items:stretch}
.garage.vertical .shelf-header{
  border-right:0.5px solid var(--b3);
  border-bottom:none;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  gap:4px;
  padding:12px 14px;
  border-radius:0;
}
.garage.vertical .shelf-body{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:6px;
  padding:8px;
  align-content:start;
}
.garage.vertical .shelf-row{min-height:52px}
.garage.vertical .flat-body{
  padding:8px;
  display:flex;
  flex-wrap:wrap;
  align-content:start;
}
.layout-toggle{display:flex;border:0.5px solid var(--b3);border-radius:var(--radius);overflow:hidden;margin-left:auto}
.layout-btn{padding:5px 9px;border:none;background:transparent;cursor:pointer;color:var(--t2);font-size:14px}
.layout-btn.active{background:var(--card2);color:var(--t1)}
.shelf-unit{background:var(--card);border:0.5px solid var(--b3);border-radius:var(--radius-lg);overflow:hidden}
.garage.vertical .shelf-unit{overflow:visible;border-radius:var(--radius-lg);display:grid;grid-template-columns:180px 1fr;border:0.5px solid var(--b3);background:var(--card)}
.garage.vertical .shelf-header{border-radius:var(--radius-lg) 0 0 var(--radius-lg);min-height:100%}
.shelf-header{background:var(--card2);padding:9px 14px;font-size:13px;font-weight:500;color:var(--t2);border-bottom:0.5px solid var(--b3);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.shelf-header:hover{background:#EEEDFE}
.shelf-header b{color:var(--t1);font-weight:600;font-size:14px}
.shelf-header-icons{display:flex;align-items:center;gap:6px}
.shelf-body{padding:8px 10px;display:flex;flex-direction:column;gap:7px}
.shelf-row{background:var(--card2);border:0.5px solid var(--b3);border-radius:8px;padding:6px 8px;min-height:58px;position:relative;transition:border-color .15s,background .15s}
.shelf-row.drag-over{border-color:#7f77dd;background:#EEEDFE}
.shelf-row-lbl{font-size:10px;color:var(--t3);position:absolute;top:4px;left:8px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;cursor:pointer}
.shelf-row-lbl:hover{color:var(--t1)}
.slots{display:flex;gap:5px;padding-top:20px;flex-wrap:wrap;align-items:flex-end}
.slot{height:32px;min-width:38px;max-width:90px;border-radius:5px;border:0.5px solid;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:grab;padding:3px 7px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.2;position:relative;user-select:none;font-weight:500}
.slot:hover{opacity:.8}
.slot.dragging{opacity:.35;cursor:grabbing}
.slot-qty{position:absolute;top:-6px;right:-5px;background:#3C3489;color:#fff;font-size:9px;border-radius:10px;padding:0 5px;min-width:16px;text-align:center;line-height:16px;height:16px;font-weight:600}
.slot-low{position:absolute;top:-6px;right:-5px;background:#A32D2D;color:#fff;font-size:9px;border-radius:10px;padding:0 5px;min-width:16px;text-align:center;line-height:16px;height:16px;font-weight:600}
.s-loose{background:#F1EFE8;color:#444441;border-color:#B4B2A9}
.s-box{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.s-original{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.s-custom{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.slot-add{height:32px;width:32px;border-radius:5px;border:0.5px dashed var(--b1);background:transparent;color:var(--t3);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;padding:0;line-height:1}
.slot-add:hover{border-color:#AFA9EC;color:#3C3489;background:#EEEDFE}
.slot-placeholder{height:32px;min-width:28px;border-radius:5px;border:0.5px dashed var(--b2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--t3);padding:2px 5px;flex:none;cursor:pointer}
.slot-placeholder:hover{border-color:#AFA9EC;color:#3C3489;background:#EEEDFE}
.slot-stack{display:flex;flex-direction:column;gap:2px;cursor:pointer;min-width:38px;max-width:90px}
.slot-stack:hover{opacity:.75}
.stack-layer{height:26px;border-radius:4px;border:0.5px solid;display:flex;align-items:center;justify-content:center;font-size:10px;padding:2px 6px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.2;font-weight:500}
.stack-lbl{font-size:9px;color:var(--t3);text-align:center;line-height:1.4}
/* PODGLĄD KONTEKSTOWY (prawy klik / długie przytrzymanie) */
.ctx-preview{position:fixed;z-index:500;background:var(--card);border:0.5px solid var(--b2);border-radius:var(--radius-lg);box-shadow:0 8px 32px rgba(0,0,0,.18);padding:12px;min-width:200px;max-width:280px;pointer-events:none}
.ctx-preview.visible{pointer-events:auto}
.ctx-preview-name{font-size:14px;font-weight:600;margin-bottom:4px}
.ctx-preview-loc{font-size:11px;color:var(--t2);margin-bottom:8px}
.ctx-preview-img{width:100%;max-height:120px;object-fit:contain;border-radius:var(--radius);margin-bottom:8px;background:var(--card2)}
.ctx-preview-subs{font-size:11px;color:var(--t2);line-height:1.6}
.ctx-preview-qty{font-size:12px;font-weight:500;color:#3C3489;margin-top:4px}
.ctx-preview-actions{display:flex;gap:6px;margin-top:10px;pointer-events:auto}
.ctx-preview-actions button{flex:1;font-size:11px;padding:5px 8px}
/* QR */
.qr-wrap{text-align:center;padding:8px 0}
.qr-wrap canvas{border-radius:var(--radius);border:0.5px solid var(--b3)}
.qr-label{font-size:12px;color:var(--t2);margin-top:8px;word-break:break-all}
.flat-unit{background:var(--card);border:0.5px solid var(--b3);border-radius:var(--radius-lg);overflow:hidden}
.flat-body{padding:8px 10px;min-height:58px}
/* LISTA */
.list{display:flex;flex-direction:column;gap:5px}
.list-row{background:var(--card);border:0.5px solid var(--b3);border-radius:var(--radius);padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer}
.list-row:hover{border-color:var(--b1)}
.iname{font-size:13px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.imeta{font-size:11px;color:var(--t2)}
.loc{font-size:11px;padding:2px 7px;border-radius:20px;background:#EEEDFE;color:#3C3489;border:0.5px solid #AFA9EC;white-space:nowrap}
.pill{font-size:11px;padding:2px 7px;border-radius:20px;border:0.5px solid;white-space:nowrap}
.p-loose{background:#F1EFE8;color:#444441;border-color:#B4B2A9}
.p-box{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.p-original{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.p-custom{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.cnt{background:var(--card2);border:0.5px solid var(--b3);border-radius:20px;padding:1px 7px;font-size:11px;color:var(--t2);margin-left:4px}
.qty-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#EEEDFE;color:#3C3489;border:0.5px solid #AFA9EC;white-space:nowrap;font-weight:500}
.qty-low{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
/* ZAPASY */
.stock-grid{display:flex;flex-direction:column;gap:6px}
.stock-row{background:var(--card);border:0.5px solid var(--b3);border-radius:var(--radius);padding:10px 14px}
.stock-row.low{border-left:3px solid #E24B4A}
.stock-row.ok{border-left:3px solid #1D9E75}
.stock-name{font-size:13px;font-weight:500;margin-bottom:4px}
.stock-meta{font-size:11px;color:var(--t2);margin-bottom:8px}
.stock-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stock-num{font-size:20px;font-weight:500;min-width:40px;text-align:center}
.stock-num.low{color:#A32D2D}
.qty-btn{width:30px;height:30px;border-radius:50%;padding:0;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
.stock-input{width:60px;flex:none;text-align:center;font-size:13px}
.alert-banner{background:#FCEBEB;border:0.5px solid #F09595;border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:13px;color:#A32D2D;display:flex;align-items:center;gap:8px}
.stock-section-title{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin:12px 0 6px}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding:32px 12px;z-index:100;overflow-y:auto}
.modal{background:var(--card);border-radius:var(--radius-lg);border:0.5px solid var(--b3);padding:1.25rem;width:100%;max-width:520px}
.mhead{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.mhead h2{font-size:15px;font-weight:500;flex:1;margin:0}
.frow{margin-bottom:10px}
.frow label{display:block;font-size:11px;color:var(--t2);margin-bottom:3px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fsec{font-size:10px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;padding-bottom:3px;border-bottom:0.5px solid var(--b3)}
.brow{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem;flex-wrap:wrap}
.pos-slots{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.pslot{width:26px;height:26px;border-radius:4px;border:0.5px solid var(--b1);background:var(--card2);font-size:11px;color:var(--t2);display:flex;align-items:center;justify-content:center}
.pslot.mine{background:#FAECE7;border-color:#F0997B;color:#712B13;font-weight:500}
.pslot.taken{background:var(--b3);color:var(--t3)}
.pos-hint{font-size:11px;color:var(--t3);margin-top:4px}
.subs{display:flex;flex-direction:column;gap:5px;margin-bottom:7px}
.subrow{display:flex;gap:5px;align-items:center}
.subrow input{flex:1}
.subrow .q{width:62px;flex:none}
.subrow .u{width:62px;flex:none}
.subrow .thr{width:54px;flex:none}
.sub-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:2px 8px;background:#FAEEDA;color:#633806;border:0.5px solid #EF9F27;border-radius:20px;margin:2px}
.sub-chip.low{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.photo-lbl{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:0.5px solid var(--b1);border-radius:var(--radius);cursor:pointer;font-size:12px;color:var(--t2)}
.photo-lbl:hover{background:var(--card2)}
.photo-lbl input{display:none}
.photo-prev{width:100%;max-height:180px;object-fit:contain;border-radius:var(--radius);border:0.5px solid var(--b3);margin-top:6px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--b3);font-size:13px;gap:10px}
.drow:last-child{border-bottom:none}
.dlbl{color:var(--t2);flex:none;font-size:12px}
.dphotos{width:100%;border-radius:var(--radius);margin-bottom:8px;max-height:200px;object-fit:contain}
.empty{padding:3rem;text-align:center;color:var(--t3);font-size:13px}
.quick-stock{display:flex;align-items:center;gap:10px;background:var(--card2);border-radius:var(--radius);padding:10px 14px;margin-top:10px}
/* Zarządzanie elementami garażu */
.container-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.container-item{background:var(--card);border:0.5px solid var(--b3);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px}
.container-item-name{flex:1;font-size:13px;font-weight:500}
.container-item-meta{font-size:11px;color:var(--t2)}
.type-icon{font-size:18px;color:var(--t3);flex:none}
/* LOGOWANIE */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-card{background:var(--card);border:0.5px solid var(--b3);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:340px}
.login-card h1{font-size:20px;font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.login-card p{font-size:13px;color:var(--t2);margin-bottom:1.5rem}
.login-label{display:block;font-size:11px;color:var(--t2);margin-bottom:4px}
.login-err{font-size:12px;color:#A32D2D;margin-bottom:10px;min-height:18px}
</style>
</head>
<body>
<div id="login-screen" class="login-wrap" style="display:none">
  <div class="login-card">
    <h1><i class="ti ti-tool" aria-hidden="true"></i> Garaż</h1>
    <p>Wpisz hasło, żeby wejść.</p>
    <label class="login-label">Hasło</label>
    <input id="lpwd" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="lerr"></div>
    <button class="btn-primary" style="width:100%;justify-content:center;display:flex;gap:6px" onclick="doLogin()">
      <i class="ti ti-lock-open" aria-hidden="true"></i> Zaloguj
    </button>
  </div>
</div>
<div class="app" id="main-app" style="display:none">
  <header>
    <i class="ti ti-tool" style="font-size:20px" aria-hidden="true"></i>
    <h1>Garaż</h1>
    <span class="status"><span class="dot off" id="dot"></span><span id="stxt" style="font-size:11px">lokalnie</span></span>
    <button onclick="exportCSV()" title="Eksportuj CSV" style="padding:6px 10px"><i class="ti ti-file-spreadsheet" aria-hidden="true"></i></button>
    <button onclick="openImportCSV()" title="Importuj CSV" style="padding:6px 10px"><i class="ti ti-file-upload" aria-hidden="true"></i></button>
    <button onclick="doLogout()" title="Wyloguj" style="padding:6px 10px"><i class="ti ti-logout" aria-hidden="true"></i></button>
  </header>
  <div class="topbar">
    <input id="srch" placeholder="Szukaj: nazwa, kategoria, lokalizacja, zawartość…" oninput="onSearch(this.value)">
    <button class="btn-primary" onclick="openAdd(null,null)"><i class="ti ti-plus" aria-hidden="true"></i> Dodaj przedmiot</button>
  </div>
  <div id="root"></div>
</div>
<div class="modal-overlay" id="modal" style="display:none" onclick="overlayClick(event)">
  <div class="modal" id="mbox"></div>
</div>
<div id="ctx-preview" class="ctx-preview" style="display:none"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ── Stałe ─────────────────────────────────────────────────────────────────────
const NORM={loose:'Luzem',box:'Pudełko',original:'Oryg. opak.'};
const NORM_BACK={'Luzem':'loose','Pudełko':'box','Oryginalne opakowanie':'original','Oryg. opak.':'original'};
const CATS=['Narzędzia ręczne','Narzędzia elektryczne','Elektronika','Akcesoria','Materiały','Części','Chemia','Malarstwo','Ogród','Inne'];
const STORAGES=['Luzem','Pudełko','Oryginalne opakowanie','Skrzynka','Worek','Torba','Szuflada'];

// Typy kontenerów z ikonami
const CONTAINER_TYPES=[
  {v:'shelf_unit', l:'Regał (z półkami)', icon:'ti-stack-2'},
  {v:'cabinet',    l:'Szafka wisząca (z półkami)', icon:'ti-door'},
  {v:'desk',       l:'Biurko (bez półek)', icon:'ti-layout-board'},
  {v:'toolbox',    l:'Domek narzędziowy (z półkami)', icon:'ti-home'},
  {v:'drawer',     l:'Komoda/szuflady (z półkami)', icon:'ti-layout-rows'},
  {v:'flat',       l:'Inne — bez półek', icon:'ti-box'},
  {v:'other',      l:'Inne — z półkami', icon:'ti-archive'},
];
function ctypeIcon(v){
  // Szukaj po v (kluczu) lub po l (etykiecie)
  return CONTAINER_TYPES.find(t=>t.v===v||t.l===v)?.icon||'ti-box';
}
function ctypeLabel(v){
  return CONTAINER_TYPES.find(t=>t.v===v||t.l===v)?.l||v||'Inny';
}
function ctypeHasShelves(v){
  // Bez półek tylko gdy typ to 'desk', 'flat' lub wpisany tekst zawiera 'biurko'/'bez półek'
  const found=CONTAINER_TYPES.find(t=>t.v===v||t.l===v);
  if(found) return!['desk','flat'].includes(found.v);
  // Własny typ — domyślnie z półkami, chyba że nazwa sugeruje inaczej
  const low=(v||'').toLowerCase();
  return!low.includes('biurk')&&!low.includes('bez półek')&&!low.includes('blat');
}

// ── Stan ──────────────────────────────────────────────────────────────────────
let items=[],nextId=1,view='garage',search='',fSubs=[],fPhoto=null,fEditId=null;
let ws=null,serverMode=false,authToken=null,dragId=null;
let pendingQty={};
let garageLayout='horizontal'; // 'horizontal' | 'vertical'

// Dynamiczne kontenery (regały, szafki, biurka…)
// Domyślnie R1-R4 zachowane jako "Regał 1-4"
let containers=[
  {id:'R1',name:'Regał 1',type:'shelf_unit',shelves:[
    {id:'P1',name:'P1',posTotal:null},{id:'P2',name:'P2',posTotal:null},
    {id:'P3',name:'P3',posTotal:null},{id:'P4',name:'P4',posTotal:null}
  ]},

// ── Auth ──────────────────────────────────────────────────────────────────────
async function doLogin(){
  const pwd=document.getElementById('lpwd').value;
  const err=document.getElementById('lerr');err.textContent='';
  if(!pwd){err.textContent='Wpisz hasło.';return;}
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
    if(!r.ok){err.textContent='Złe hasło.';return;}
    authToken=(await r.json()).token;saveToken(authToken);showApp();
  }catch(e){authToken=null;showApp();}
}
function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  lsLoad();lsLoadContainers();render();tryWS();
  loadContainersFromServer().then(render);
}
function doLogout(){
  clearToken();authToken=null;serverMode=false;
  if(ws){ws.close();ws=null;}
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('lpwd').value='';
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function tryWS(){
  if(!authToken)return;
  try{
    ws=new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}/?token=${authToken}`);
    ws.onopen=()=>{serverMode=true;document.getElementById('dot').className='dot';document.getElementById('stxt').textContent='na żywo';};
    ws.onclose=()=>{serverMode=false;document.getElementById('dot').className='dot off';document.getElementById('stxt').textContent='lokalnie';ws=null;setTimeout(tryWS,8000);};
    ws.onerror=()=>{ws=null;};
    ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type==='AUTH_ERROR'){doLogout();return;}
      if(m.type==='INIT'){items=m.items;nextId=Math.max(0,...items.map(x=>x.id))+1;render();}
      else if(m.type==='ITEM_ADDED'){items.push(m.item);render();}
      else if(m.type==='ITEM_UPDATED'){const i=items.findIndex(x=>x.id===m.item.id);if(i>-1)items[i]=m.item;render();}
      else if(m.type==='ITEM_DELETED'){items=items.filter(x=>x.id!==m.id);render();}
      else if(m.type==='LABELS_UPDATED'){if(m.containers)containers=m.containers;if(m.nextContainerId)nextContainerId=m.nextContainerId;render();}
    };
  }catch(e){ws=null;}
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiCall(method,path,body){
  const h={'Content-Type':'application/json'};
  if(authToken)h['Authorization']=`Bearer ${authToken}`;
  const r=await fetch(path,{method,headers:h,body:body?JSON.stringify(body):undefined});
  if(r.status===401){doLogout();throw new Error('Sesja wygasła');}
  if(!r.ok)throw new Error(await r.text());
  if(method==='DELETE')return null;
  return r.json();
}
async function doSaveApi(body,editId){
  if(serverMode)return editId?apiCall('PUT',`/api/items/${editId}`,body):apiCall('POST','/api/items',body);
  if(editId){const i=items.findIndex(x=>x.id===editId);if(i>-1)items[i]={...items[i],...body,id:editId,updatedAt:new Date().toISOString()};}
  else items.push({...body,id:nextId++,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});
  lsSave();render();
}
async function doDeleteApi(id){
  if(serverMode){await apiCall('DELETE',`/api/items/${id}`);return;}
  items=items.filter(x=>x.id!==id);lsSave();render();
}

function sLabel(v){return NORM[v]||v||''}
function sSlot(v){return{loose:'s-loose',box:'s-box',original:'s-original'}[v]||'s-custom'}
function sPill(v){return{loose:'p-loose',box:'p-box',original:'p-original'}[v]||'p-custom'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function stackText(i){
  if(!i.stackLevel)return'';
  const lvl=parseInt(i.stackLevel),tot=parseInt(i.stackTotal)||'?';
  return tot<=3&&lvl<=3?(['dół','środek','góra'][lvl-1]||`poziom ${lvl}`)+` z ${tot}`:`poziom ${lvl} z ${tot}`;
}
function itemQty(i){return(i.qty!=null&&i.qty!=='')?parseInt(i.qty):null;}
function isLow(i){
  const q=itemQty(i);
  if(q!=null&&i.qtyThreshold!=null&&q<=parseInt(i.qtyThreshold))return true;
  return(i.subitems||[]).some(s=>s.qty!=null&&s.qtyThreshold!=null&&parseInt(s.qty)<=parseInt(s.qtyThreshold));
}
function pendingKey(id,subIdx){return subIdx!=null?`${id}_${subIdx}`:`${id}`;}
// Pobierz kontener i półkę po id
function getContainer(cid){return containers.find(c=>c.id===cid);}
function getShelf(cid,sid){return getContainer(cid)?.shelves?.find(s=>s.id===sid);}
// Czytelna lokalizacja przedmiotu
function itemLocLabel(i){
  const c=getContainer(i.regal);
  const cname=c?c.name:i.regal;
  if(!i.polka||i.polka==='_')return cname;
  const s=getShelf(i.regal,i.polka);
  const sname=s?s.name:i.polka;
  return`${cname} / ${sname}`;
}

function buildGarage(items){

function buildContainer(c,items){
  const ci=items.filter(x=>x.regal===c.id);
  const hasShelves=ctypeHasShelves(c.type)&&c.shelves&&c.shelves.length>0;

        <i class="ti ti-pencil" style="font-size:11px;opacity:.5" aria-hidden="true"></i>
      </div>
    </div>
    ${hasShelves
      ? `<div class="shelf-body">${c.shelves.map(s=>buildShelfRow(c.id,s,items)).join('')}</div>`
      : `<div class="flat-body">${buildFlatSlots(c,items)}</div>`}
  </div>`;
}

function buildFlatSlots(c,items){
  // Element bez półek — pokazuje sloty bezpośrednio
  const ci=items.filter(x=>x.regal===c.id);
  const slots=ci.map(i=>renderSlot(i,null,null)).join('');
  return`<div class="slots" style="padding-top:8px">${slots}<button class="slot-add" onclick="openAdd('${c.id}','_')" title="Dodaj">+</button></div>`;
}

function buildShelfRow(cid,shelf,items){
  const pi=[...items.filter(x=>x.regal===cid&&x.polka===shelf.id)].sort((a,b)=>(parseInt(a.posIndex)||999)-(parseInt(b.posIndex)||999));
  const maxTotal=shelf.posTotal||pi.reduce((m,i)=>Math.max(m,parseInt(i.posTotal)||0),0);
  const byPos=new Map();
  pi.forEach(i=>{
    const k=i.posIndex?parseInt(i.posIndex):null;
    const key=k!=null?k:`_${i.id}`;
    if(!byPos.has(key))byPos.set(key,[]);
    byPos.get(key).push(i);
  });
  let slots='';
  if(maxTotal>0){
    for(let pos=1;pos<=maxTotal;pos++){
      const g=byPos.get(pos);
      if(!g){
        slots+=`<div class="slot-placeholder" onclick="openAdd('${cid}','${shelf.id}',${pos},${maxTotal})">+${pos}</div>`;
      } else if(g.length===1){
        slots+=renderSlot(g[0],pos,maxTotal);
      } else {
        const sorted=[...g].sort((a,b)=>(parseInt(b.stackLevel)||1)-(parseInt(a.stackLevel)||1));
        const layers=sorted.map(i=>renderStackLayer(i)).join('');
        slots+=`<div class="slot-stack"><div class="stack-lbl">↕${g.length} poz.${pos}</div>${layers}</div>`;
      }
    }
    [...byPos.entries()].filter(([k])=>typeof k==='string'&&k.startsWith('_')).forEach(([,g])=>{
      if(g.length===1)slots+=renderSlot(g[0],null,null);
      else{const sorted=[...g].sort((a,b)=>(parseInt(b.stackLevel)||1)-(parseInt(a.stackLevel)||1));slots+=`<div class="slot-stack"><div class="stack-lbl">↕${g.length}</div>${sorted.map(i=>renderStackLayer(i)).join('')}</div>`;}
    });
  } else {
    pi.forEach(i=>{slots+=renderSlot(i,null,null);});
  }
  const cfgInfo=shelf.posTotal?` · ${shelf.posTotal} miejsc`:'';
  return`<div class="shelf-row"
    ondragover="onDragOver(event)" ondragleave="onDragLeave(event)"
    ondrop="onDrop(event,'${cid}','${shelf.id}')"
    data-regal="${cid}" data-polka="${shelf.id}">
    <span class="shelf-row-lbl" onclick="event.stopPropagation();openEditContainer('${cid}')">${esc(shelf.name)}${cfgInfo}</span>
    <div class="slots">${slots}<button class="slot-add" onclick="openAdd('${cid}','${shelf.id}')" title="Dodaj">+</button></div>
  </div>`;
}

function slotColorStyle(i){return i.customColor?`style="background:${i.customColor};border-color:${i.customColor};color:#fff"`:''}
function slotAttrs(i){
  return`draggable="true"
    ondragstart="onDragStart(event,${i.id})"
    onclick="openDetail(${i.id})"
    onmouseenter="startHoverPreview(event,${i.id})"
    onmouseleave="cancelHoverTimer()"
    ontouchstart="startLongPress(event,${i.id})"
    ontouchend="cancelLongPress()"
    ontouchmove="cancelLongPress()"`;
}

function renderStackLayer(i){
  const lbl=i.name.length>14?i.name.slice(0,13)+'…':i.name;
  const cls=i.customColor?'stack-layer':`stack-layer ${sSlot(i.storage)}`;
  return`<div class="${cls}" ${slotColorStyle(i)} ${slotAttrs(i)}>${esc(lbl)}</div>`;
}
function renderSlot(i,pos,total){
  const lbl=i.name.length>14?i.name.slice(0,13)+'…':i.name;
  const q=itemQty(i);const low=isLow(i);
  const badge=q!=null?`<span class="${low?'slot-low':'slot-qty'}">${q}</span>`:'';
  const posTitle=pos!=null&&total?` poz.${pos}/${total}`:'';
  const cls=i.customColor?'slot':`slot ${sSlot(i.storage)}`;
  return`<div class="${cls}" ${slotColorStyle(i)} ${slotAttrs(i)}>${badge}${esc(lbl)}</div>`;
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────
function onDragStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>{const el=e.target;if(el)el.classList.add('dragging');},0);}
function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over');}
async function onDrop(e,regal,polka){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!dragId)return;
  const i=items.find(x=>x.id===dragId);
  if(!i||i.regal===regal&&i.polka===polka){dragId=null;return;}
  try{await doSaveApi({...i,regal,polka},dragId);}catch(err){alert('Błąd: '+err.message);}
  dragId=null;
}

  if(!ctypeHasShelves(c.type))c.shelves=[];
  await saveContainersToServer();
  closeModal();render();
}

function openEditShelf(cid,si){
  const c=getContainer(cid);if(!c)return;
  const s=c.shelves[si];if(!s)return;
  showModal(`

      <button onclick="closeModal()" style="padding:4px 9px">✕</button>
    </div>

    <div class="frow"><label>Liczba miejsc (posTotal)</label>
      <input id="se-total" type="number" min="0" value="${s.posTotal||''}" placeholder="zostaw puste jeśli nie używasz pozycji">

    </div>
    <div class="brow">

}

async function doEditShelf(cid,si){
  const c=getContainer(cid);if(!c)return;
  c.shelves[si].name=document.getElementById('se-name').value.trim()||c.shelves[si].name;
  c.shelves[si].posTotal=parseInt(document.getElementById('se-total').value)||null;
  await saveContainersToServer();
  openEditContainer(cid);
}

async function addShelf(cid){
  const c=getContainer(cid);if(!c)return;
  const n=c.shelves.length+1;
  c.shelves.push({id:`P${n}`,name:`P${n}`,posTotal:null});
  await saveContainersToServer();
  openEditContainer(cid);
}

async function deleteShelf(cid,si){
  const c=getContainer(cid);if(!c)return;
  const s=c.shelves[si];
  const count=items.filter(x=>x.regal===cid&&x.polka===s.id).length;
  if(count>0&&!confirm(`Na tej półce jest ${count} przedmiotów. Usunięcie półki nie usuwa przedmiotów, ale stracą przypisanie do półki. Kontynuować?`))return;
  c.shelves.splice(si,1);
  await saveContainersToServer();
  openEditContainer(cid);
}

function confirmDeleteContainer(cid){
  const c=getContainer(cid);if(!c)return;
  const count=items.filter(x=>x.regal===cid).length;
  if(count>0){
    if(!confirm(`Element "${c.name}" zawiera ${count} przedmiotów. Usunięcie elementu NIE usunie przedmiotów — stracą tylko przypisanie lokalizacji. Kontynuować?`))return;
  } else {
    if(!confirm(`Usunąć "${c.name}"?`))return;
  }
  containers=containers.filter(x=>x.id!==cid);
  saveContainersToServer();
  closeModal();render();
}

async function moveContainer(cid,dir){
  const idx=containers.findIndex(c=>c.id===cid);
  if(idx<0)return;
  const ni=idx+dir;
  if(ni<0||ni>=containers.length)return;
  [containers[idx],containers[ni]]=[containers[ni],containers[idx]];
  await saveContainersToServer();
  render();
}

// ── LISTA ─────────────────────────────────────────────────────────────────────
function buildList(items){
  const sorted=[...items].sort((a,b)=>a.name.localeCompare(b.name,'pl'));

function buildSearch(fi){

function listRow(i){

// ── ZAPASY ────────────────────────────────────────────────────────────────────
function buildStock(){
  const tracked=[];
  items.forEach(i=>{
    if(itemQty(i)!=null)tracked.push({type:'item',item:i,name:i.name,qty:parseInt(i.qty),unit:i.qtyUnit||'',threshold:i.qtyThreshold!=null?parseInt(i.qtyThreshold):null,low:isLow(i),id:i.id,subIdx:null});
    (i.subitems||[]).forEach((s,si)=>{
      if(s.qty!=null&&s.qty!==''){
        const low=s.qtyThreshold!=null&&parseInt(s.qty)<=parseInt(s.qtyThreshold);
        tracked.push({type:'sub',item:i,name:`${i.name} → ${s.name}`,qty:parseInt(s.qty),unit:s.unit||'',threshold:s.qtyThreshold!=null?parseInt(s.qtyThreshold):null,low,id:i.id,subIdx:si});
      }
    });
  });
  if(!tracked.length)return`<div class="empty"><i class="ti ti-package" style="font-size:28px;display:block;margin-bottom:8px" aria-hidden="true"></i>Brak pozycji z ustawionym stanem.<br><br>Dodaj przedmiot i wypełnij pole <b>Stan / ilość</b>.</div>`;
  const low=tracked.filter(x=>x.low),ok=tracked.filter(x=>!x.low);
  let html='';
  if(low.length)html+=`<div class="alert-banner"><i class="ti ti-alert-triangle" aria-hidden="true"></i> ${low.length} pozycj${low.length===1?'a':'e'} poniżej progu!</div>`;
  if(low.length)html+=`<div class="stock-section-title">⚠ Niski stan</div><div class="stock-grid">${low.map(t=>stockRow(t)).join('')}</div>`;
  if(ok.length)html+=`<div class="stock-section-title">Pozostałe zapasy</div><div class="stock-grid">${ok.map(t=>stockRow(t)).join('')}</div>`;
  return html;
}
function stockRow(t){
  const pct=t.threshold?Math.min(100,Math.round(t.qty/t.threshold*100)):null;
  const key=pendingKey(t.id,t.subIdx);
  return`<div class="stock-row ${t.low?'low':'ok'}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
      <div><div class="stock-name">${esc(t.name)}</div>
        <div class="stock-meta">${esc(itemLocLabel(t.item))}${t.threshold!=null?' · próg: '+t.threshold+' '+(t.unit||''):''}</div>
      </div>
      <div class="stock-controls">
        <button class="qty-btn btn-danger" onclick="adjustQtyLocal(${t.id},${t.subIdx!=null?t.subIdx:'null'},-1)">−</button>
        <span id="qty-display-${key}" class="stock-num${t.low?' low':''}">${t.qty}${t.unit?' <small style="font-size:12px">'+esc(t.unit)+'</small>':''}</span>
        <button class="qty-btn" onclick="adjustQtyLocal(${t.id},${t.subIdx!=null?t.subIdx:'null'},1)">+</button>
        <input type="number" class="stock-input" value="${t.qty}" min="0" onchange="setQty(${t.id},${t.subIdx!=null?t.subIdx:'null'},this.value)">
        <button id="save-qty-${t.id}" class="btn-primary" style="display:none;padding:5px 10px;font-size:12px" onclick="saveQtyChanges(${t.id})">
          <i class="ti ti-device-floppy" aria-hidden="true"></i> Zapisz
        </button>
      </div>
    </div>
    ${pct!=null?`<div style="margin-top:6px;height:4px;background:var(--b3);border-radius:2px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${t.low?'#E24B4A':'#1D9E75'};border-radius:2px"></div></div>`:''}
  </div>`;
}

// ── Qty management ────────────────────────────────────────────────────────────
function adjustQtyLocal(id,subIdx,delta){
  const i=items.find(x=>x.id===id);if(!i)return;
  const key=pendingKey(id,subIdx);
  let cur;
  if(subIdx!=null){cur=pendingQty[key]!=null?pendingQty[key]:(parseInt((i.subitems||[])[subIdx]?.qty)||0);}
  else{cur=pendingQty[key]!=null?pendingQty[key]:(parseInt(i.qty)||0);}
  pendingQty[key]=Math.max(0,cur+delta);
  const el=document.getElementById(`qty-display-${key}`);
  if(el){el.textContent=pendingQty[key];el.style.color='#854f0b';}
  const saveBtn=document.getElementById(`save-qty-${id}`);
  if(saveBtn)saveBtn.style.display='flex';
}
async function saveQtyChanges(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  let body={...i};
  const mainKey=pendingKey(id,null);
  if(pendingQty[mainKey]!=null)body.qty=pendingQty[mainKey];
  const subs=[...(i.subitems||[])];
  subs.forEach((s,si)=>{const k=pendingKey(id,si);if(pendingQty[k]!=null)subs[si]={...s,qty:pendingQty[k]};});
  body.subitems=subs;
  try{
    await doSaveApi(body,id);
    Object.keys(pendingQty).filter(k=>k===String(id)||k.startsWith(`${id}_`)).forEach(k=>delete pendingQty[k]);
    openDetail(id);
  }catch(e){alert('Błąd zapisu: '+e.message);}
}
async function setQty(id,subIdx,val){
  const key=pendingKey(id,subIdx);
  pendingQty[key]=Math.max(0,parseInt(val)||0);
  const el=document.getElementById(`qty-display-${key}`);
  if(el){el.textContent=pendingQty[key];el.style.color='#854f0b';}
  const saveBtn=document.getElementById(`save-qty-${id}`);
  if(saveBtn)saveBtn.style.display='flex';
}

function updateFormShelves(){
  const cid=document.getElementById('fr').value;
  const c=getContainer(cid);
  const wrap=document.getElementById('fs-wrap');if(!wrap)return;
  const hasShelves=ctypeHasShelves(c?.type||'shelf_unit')&&(c?.shelves||[]).length>0;
  if(hasShelves){
    wrap.innerHTML=`<label>Półka</label><select id="fp">${(c.shelves||[]).map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select>`;
  } else {
    wrap.innerHTML='';
  }
  refreshPos();
}

function subRow(s,idx){
  return`<div class="subrow">
    <input placeholder="wałek, pędzel…" value="${esc(s.name||'')}" oninput="fSubs[${idx}].name=this.value">
    <input class="q" type="number" min="0" placeholder="ile" value="${s.qty??''}" oninput="fSubs[${idx}].qty=this.value===''?null:Number(this.value)">
    <input class="u" placeholder="szt/m" value="${esc(s.unit||'')}" oninput="fSubs[${idx}].unit=this.value">
    <input class="thr" type="number" min="0" placeholder="próg" value="${s.qtyThreshold??''}" oninput="fSubs[${idx}].qtyThreshold=this.value===''?null:Number(this.value)">
    <button onclick="removeSub(${idx})" class="btn-danger" style="padding:4px 7px;flex:none"><i class="ti ti-x" aria-hidden="true"></i></button>
  </div>`;
}
function addSub(){fSubs.push({name:'',qty:null,unit:'',qtyThreshold:null});const l=document.getElementById('subs');if(l){const d=document.createElement('div');d.innerHTML=subRow(fSubs[fSubs.length-1],fSubs.length-1);l.appendChild(d.firstElementChild);}}
function removeSub(idx){fSubs.splice(idx,1);const l=document.getElementById('subs');if(l)l.innerHTML=fSubs.map((s,i)=>subRow(s,i)).join('');}

function pickColor(c){
  const inp=document.getElementById('fcol');if(inp)inp.value=c||'#5DCAA5';
  document.querySelectorAll('#color-presets button').forEach((b,i)=>{
    const colors=['','#5DCAA5','#85B7EB','#EF9F27','#F0997B','#AFA9EC','#f87171','#4ade80','#60a5fa','#e879f9','#facc15'];
    b.style.border=colors[i]===c?'2px solid #3C3489':'0.5px solid var(--b1)';
  });
  if(inp){inp.style.opacity=c?'1':'.4';inp.dataset.clear=c?'':'1';}
}

function refreshPos(){
  const t=parseInt(document.getElementById('fpt')?.value)||0;
  const m=parseInt(document.getElementById('fpi')?.value)||0;
  const cid=document.getElementById('fr')?.value;
  const sid=document.getElementById('fp')?.value;
  const w=document.getElementById('pospreview');if(!w)return;
  if(!t){w.innerHTML='';return;}
  const occ=new Set(items.filter(x=>x.regal===cid&&x.polka===sid&&x.id!==fEditId&&x.posIndex).map(x=>parseInt(x.posIndex)));
  let s='';
  for(let i=1;i<=Math.min(t,16);i++){const im=i===m,tk=!im&&occ.has(i);s+=`<div class="pslot${im?' mine':tk?' taken':''}">${i}</div>`;}
  w.innerHTML=`<div class="pos-slots">${s}</div>`;
}

function handlePhoto(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{fPhoto=ev.target.result;rePhoto();};r.readAsDataURL(f);}
function rePhoto(){const w=document.getElementById('phtw');if(!w)return;w.innerHTML=fPhoto?`<div style="position:relative"><img src="${fPhoto}" class="photo-prev"><button class="btn-danger" onclick="fPhoto=null;rePhoto()" style="position:absolute;top:4px;right:4px;padding:2px 7px;font-size:11px">✕</button></div>`:'';
}

function validatePosition(body){
  const errors=[];
  const {regal,polka,posIndex,posTotal,stackLevel}=body;
  if(!posIndex&&!posTotal)return[];
  const others=items.filter(x=>x.regal===regal&&x.polka===polka&&x.id!==fEditId&&x.posIndex);
  if(posTotal){const conflict=others.find(x=>x.posTotal&&parseInt(x.posTotal)!==posTotal);if(conflict)errors.push(`Niezgodna liczba miejsc: ten=${posTotal}, "${conflict.name}"=${conflict.posTotal}. Wszystkie przedmioty na tej półce muszą mieć tę samą wartość.`);}
  if(posIndex){const samePos=others.filter(x=>parseInt(x.posIndex)===posIndex);if(samePos.length>0){const realConflict=samePos.filter(x=>!stackLevel||!x.stackLevel);if(realConflict.length>0)errors.push(`Konflikt pozycji ${posIndex}: zajęta przez "${realConflict.map(x=>x.name).join(', ')}". Ustaw Poziom w stosie jeśli chcesz ułożyć jeden na drugim.`);}}
  return errors;
}
function showFormError(msg){
  let box=document.getElementById('form-error');
  if(!box){box=document.createElement('div');box.id='form-error';box.style.cssText='background:#FCEBEB;border:0.5px solid #F09595;border-radius:8px;padding:10px 14px;font-size:12px;color:#A32D2D;white-space:pre-line;margin-bottom:10px';const brow=document.querySelector('.brow');if(brow)brow.parentNode.insertBefore(box,brow);}
  box.innerHTML=`<b><i class="ti ti-alert-triangle" style="font-size:13px" aria-hidden="true"></i> Błąd walidacji</b>\n\n${esc(msg)}`;
  box.scrollIntoView({behavior:'smooth',block:'nearest'});
}

async function doSave(){
  const name=document.getElementById('fn').value.trim();
  if(!name){document.getElementById('fn').focus();return;}
  const rawS=document.getElementById('fs').value.trim();
  const storage=NORM_BACK[rawS]||rawS||'loose';
  const qtyVal=document.getElementById('fqty').value;
  const thrVal=document.getElementById('fqthr').value;
  const colInp=document.getElementById('fcol');
  const customColor=colInp?.dataset?.clear==='1'?null:(colInp?.value||null);
  const polkaEl=document.getElementById('fp');
  const body={name,
    cat:document.getElementById('fc').value.trim()||'Inne',
    regal:document.getElementById('fr').value,
    polka:polkaEl?polkaEl.value:'_',
    storage,customColor,
    posIndex:parseInt(document.getElementById('fpi').value)||null,
    posTotal:parseInt(document.getElementById('fpt').value)||null,
    stackLevel:parseInt(document.getElementById('fsl').value)||null,
    stackTotal:parseInt(document.getElementById('fst').value)||null,
    qty:qtyVal===''?null:parseInt(qtyVal),
    qtyUnit:document.getElementById('fqunit').value.trim()||null,
    qtyThreshold:thrVal===''?null:parseInt(thrVal),
    note:document.getElementById('fnote').value.trim(),

  try{await doSaveApi(body,fEditId);closeModal();}catch(e){alert('Błąd: '+e.message);}

function exportCSV(){
  const makeCSV=()=>{
    const h='ID,Nazwa,Kategoria,Lokalizacja,Element,Półka,Pozycja,Miejsc,Poziom,Poziomów,Ilość,Jednostka,Próg,Przechowywanie,Notatka,Podpozycje\n';
    const rows=items.map(i=>{const sub=(i.subitems||[]).map(s=>`${s.name}${s.qty!=null?' x'+s.qty:''}${s.unit?' '+s.unit:''}`).join(' | ');return[i.id,`"${(i.name||'').replace(/"/g,'""')}"`,`"${(i.cat||'').replace(/"/g,'""')}"`,`"${itemLocLabel(i).replace(/"/g,'""')}"`,i.regal,i.polka,i.posIndex||'',i.posTotal||'',i.stackLevel||'',i.stackTotal||'',i.qty??'',i.qtyUnit||'',i.qtyThreshold??'',`"${(i.storage||'').replace(/"/g,'""')}"`,`"${(i.note||'').replace(/"/g,'""')}"`,`"${sub.replace(/"/g,'""')}"`].join(',');});
    return'\uFEFF'+h+rows.join('\n');
  };
  if(serverMode){fetch('/api/export/csv',{headers:{'Authorization':`Bearer ${authToken}`}}).then(r=>r.blob()).then(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='garaz.csv';a.click();});return;}
  const blob=new Blob([makeCSV()],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='garaz.csv';a.click();
}

    <div class="mhead"><i class="ti ti-file-upload" style="font-size:17px" aria-hidden="true"></i>

    </div>

    </div>

      <label>Co zrobić z istniejącymi danymi?</label>
      <select id="csv-mode">
        <option value="add">Dodaj do istniejących (nie usuwaj)</option>

      </select>

function parseCSVLine(line){
  const result=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){result.push(cur);cur='';}
    else cur+=ch;
  }
  result.push(cur);
  return result;
}

function previewCSV(){
  const file=document.getElementById('csv-file').files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
    const prev=document.getElementById('csv-preview');
    if(prev)prev.textContent=`Znaleziono ${lines.length-1} wierszy do importu.`;
  };
  reader.readAsText(file,'UTF-8');
}

async function doImportCSV(){
  const file=document.getElementById('csv-file').files[0];
  if(!file){alert('Wybierz plik CSV.');return;}
  const mode=document.getElementById('csv-mode').value;
  const reader=new FileReader();
  reader.onload=async e=>{
    const text=e.target.result.replace(/^\uFEFF/,'');
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){alert('Plik jest pusty lub nie zawiera danych.');return;}
    // Nagłówki
    const headers=parseCSVLine(lines[0]).map(h=>h.trim().toLowerCase());
    const col=name=>{
      const aliases={
        'id':['id'],
        'nazwa':['nazwa','name'],
        'kategoria':['kategoria','cat','kategoria'],
        'element':['element','regał','regal'],
        'półka':['półka','polka','shelf'],
        'pozycja':['pozycja','posindex'],
        'miejsc':['miejsc','postotal'],
        'poziom':['poziom','stacklevel'],
        'poziomów':['poziomów','stacktotal'],
        'ilość':['ilość','qty','ilosc'],
        'jednostka':['jednostka','qtyunit'],
        'próg':['próg','qtythreshold','prog'],
        'przechowywanie':['przechowywanie','storage'],
        'notatka':['notatka','note'],
        'podpozycje':['podpozycje','subitems'],
      };
      const variants=aliases[name]||[name];
      for(const v of variants){const idx=headers.findIndex(h=>h===v||h.includes(v));if(idx>-1)return idx;}
      return -1;
    };
    const imported=[];
    for(let li=1;li<lines.length;li++){
      const row=parseCSVLine(lines[li]);
      if(row.every(c=>!c.trim()))continue;
      const name=(row[col('nazwa')]||'').trim();
      if(!name)continue;
      // Mapuj przechowywanie
      const rawStorage=(row[col('przechowywanie')]||'').trim();
      const storage=NORM_BACK[rawStorage]||rawStorage||'loose';
      // Podpozycje — format: "wałek x3 szt | pędzel x1"
      const subRaw=(row[col('podpozycje')]||'').trim();
      const subitems=subRaw?subRaw.split('|').map(s=>{
        const m=s.trim().match(/^(.+?)\s*x(\d+)\s*(.*)$/i);
        if(m)return{name:m[1].trim(),qty:parseInt(m[2]),unit:m[3].trim()||'',qtyThreshold:null};
        return{name:s.trim(),qty:null,unit:'',qtyThreshold:null};
      }).filter(s=>s.name):[];
      const qtyVal=col('ilość')>-1?(row[col('ilość')]||'').trim():'';
      const thrVal=col('próg')>-1?(row[col('próg')]||'').trim():'';
      imported.push({
        name,
        cat:(row[col('kategoria')]||'Inne').trim()||'Inne',
        regal:(row[col('element')]||containers[0]?.id||'R1').trim(),
        polka:(row[col('półka')]||'P1').trim(),
        posIndex:parseInt(row[col('pozycja')])||null,
        posTotal:parseInt(row[col('miejsc')])||null,
        stackLevel:parseInt(row[col('poziom')])||null,
        stackTotal:parseInt(row[col('poziomów')])||null,
        storage,
        note:(row[col('notatka')]||'').trim(),
        qty:qtyVal===''?null:parseInt(qtyVal),
        qtyUnit:(row[col('jednostka')]||'').trim()||null,
        qtyThreshold:thrVal===''?null:parseInt(thrVal),
        subitems,
        photo:null,
        customColor:null,
      });
    }
    if(!imported.length){alert('Nie znaleziono żadnych wierszy do importu.');return;}
    if(mode==='replace'){
      if(!confirm(`Zastąpić ${items.length} istniejących przedmiotów ${imported.length} nowymi z pliku?`))return;
      items=[];nextId=1;
    }
    let added=0;
    for(const body of imported){
      try{await doSaveApi(body,null);added++;}catch(e){console.error('Import error:',e);}
    }
    closeModal();
    alert(`Zaimportowano ${added} z ${imported.length} przedmiotów.`);
  };
  reader.readAsText(file,'UTF-8');
}

// ── PODGLĄD (prawy klik / długie przytrzymanie) ───────────────────────────────
let longPressTimer=null;
let hoverTimer=null;
let hideTimer=null;
let previewVisible=false;

function startHoverPreview(e,id){
  // Anuluj ewentualne chowanie
  if(hideTimer){clearTimeout(hideTimer);hideTimer=null;}
  // Anuluj poprzedni timer
  if(hoverTimer){clearTimeout(hoverTimer);hoverTimer=null;}
  const ex=e.clientX, ey=e.clientY;
  hoverTimer=setTimeout(()=>{
    hoverTimer=null;
    showPreview({clientX:ex,clientY:ey},id,true);
  },800);
}

function cancelHoverTimer(){
  // Wywoływane gdy mysz opuszcza slot — anuluj timer ALE nie chowaj okienka od razu
  if(hoverTimer){clearTimeout(hoverTimer);hoverTimer=null;}
  // Daj 400ms żeby móc wjechać kursorem w okienko
  hideTimer=setTimeout(()=>{
    const wrap=document.getElementById('ctx-preview');
    if(!wrap?.matches(':hover')) hidePreview();
    hideTimer=null;
  },400);
}

function showPreview(e,id,fromHover){
  if(e&&e.preventDefault)e.preventDefault();
  const i=items.find(x=>x.id===id);if(!i)return;
  const sub=(i.subitems||[]).filter(s=>s.name);
  const q=itemQty(i);const low=isLow(i);
  const wrap=document.getElementById('ctx-preview');
  wrap.innerHTML=`
    ${i.photo?`<img src="${i.photo}" class="ctx-preview-img" alt="">`:''}
    <div class="ctx-preview-name">${esc(i.name)}</div>
    <div class="ctx-preview-loc"><i class="ti ti-map-pin" style="font-size:10px" aria-hidden="true"></i> ${esc(itemLocLabel(i))}${i.posIndex&&i.posTotal?' · poz.'+i.posIndex+'/'+i.posTotal:''}</div>
    ${q!=null?`<div class="ctx-preview-qty${low?' qty-low':''}">${q}${i.qtyUnit?' '+esc(i.qtyUnit):''}${low?' ⚠':''}</div>`:''}
    ${sub.length?`<div class="ctx-preview-subs">${sub.slice(0,5).map(s=>`<span>• ${esc(s.name)}${s.qty!=null?' ×'+s.qty:''}</span>`).join('<br>')}${sub.length>5?`<br><span style="color:var(--t3)">…i ${sub.length-5} więcej</span>`:''}</div>`:''}
    <div class="ctx-preview-actions">
      <button onclick="openDetail(${id});hidePreview()" style="background:var(--card2)"><i class="ti ti-eye" aria-hidden="true"></i> Szczegóły</button>
      <button onclick="showQR(${id});hidePreview()" style="background:#EEEDFE;color:#3C3489;border-color:#AFA9EC"><i class="ti ti-qrcode" aria-hidden="true"></i> QR</button>
    </div>`;
  wrap.onmouseenter=()=>{if(hideTimer){clearTimeout(hideTimer);hideTimer=null;}};
  wrap.onmouseleave=()=>hidePreview();
  const x=e.clientX||e.touches?.[0]?.clientX||0;
  const y=e.clientY||e.touches?.[0]?.clientY||0;
  wrap.style.display='block';
  wrap.classList.add('visible');
  const pw=wrap.offsetWidth||260,ph=wrap.offsetHeight||200;
  wrap.style.left=Math.min(x+12,window.innerWidth-pw-12)+'px';
  wrap.style.top=Math.min(y+8,window.innerHeight-ph-12)+'px';
  previewVisible=true;
}

function hidePreview(){
  const wrap=document.getElementById('ctx-preview');
  if(wrap){wrap.style.display='none';wrap.classList.remove('visible');}
  previewVisible=false;
}

function startLongPress(e,id){
  cancelLongPress();
  longPressTimer=setTimeout(()=>{
    longPressTimer=null;
    showPreview(e,id);
  },600);
}
function cancelLongPress(){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}
}

// ── QR KOD ────────────────────────────────────────────────────────────────────
function showQR(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const url=`${location.origin}${location.pathname}?item=${id}`;
  showModal(`
    <div class="mhead"><i class="ti ti-qrcode" style="font-size:17px" aria-hidden="true"></i>
      <h2>QR: ${esc(i.name)}</h2>
      <button onclick="closeModal()" style="padding:4px 9px">✕</button>
    </div>
    <div class="qr-wrap">
      <div id="qr-canvas"></div>
      <div class="qr-label">${esc(url)}</div>
      <div style="font-size:11px;color:var(--t2);margin-top:6px">Zeskanuj aparatem → od razu otwiera szczegóły przedmiotu</div>
    </div>
    <div style="font-size:12px;color:var(--t2);margin:8px 0 4px">Lokalizacja: <b>${esc(itemLocLabel(i))}</b></div>
    ${i.posIndex&&i.posTotal?`<div style="font-size:12px;color:var(--t2);margin-bottom:4px">Pozycja: <b>${i.posIndex} z ${i.posTotal}</b></div>`:''}
    <div class="brow">
      <button onclick="printQR(${id})"><i class="ti ti-printer" aria-hidden="true"></i> Drukuj etykietę</button>
      <button onclick="closeModal()">Zamknij</button>
    </div>`);
  // Generuj QR po renderowaniu modala
  setTimeout(()=>{
    const el=document.getElementById('qr-canvas');
    if(el&&typeof QRCode!=='undefined'){
      new QRCode(el,{text:url,width:200,height:200,colorDark:'#1a1a18',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    }
  },50);
}

function printQR(id){
  const i=items.find(x=>x.id===id);if(!i)return;
  const url=`${location.origin}${location.pathname}?item=${id}`;
  const canvas=document.querySelector('#qr-canvas canvas');
  const qrDataUrl=canvas?canvas.toDataURL():'';
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Etykieta QR — ${i.name}</title>
    <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,sans-serif;padding:20px}
    .label{border:1.5px solid #ccc;border-radius:8px;padding:16px;max-width:260px;text-align:center}
    .name{font-size:16px;font-weight:600;margin:10px 0 4px}
    .loc{font-size:12px;color:#666;margin-bottom:4px}
    .url{font-size:9px;color:#999;word-break:break-all;margin-top:8px}
    @media print{body{padding:0}}</style>
  </head><body>
    <div class="label">
      ${qrDataUrl?`<img src="${qrDataUrl}" width="180" height="180">`:''}
      <div class="name">${i.name}</div>
      <div class="loc">${itemLocLabel(i)}${i.posIndex&&i.posTotal?' · poz.'+i.posIndex+'/'+i.posTotal:''}</div>
      <div class="url">${url}</div>
    </div>
    <script>window.onload=()=>window.print()<\/script>
  </body></html>`);
  w.document.close();
}

// Obsługa linku ?item=ID przy wejściu na stronę
function handleItemLink(){
  const params=new URLSearchParams(location.search);
  const id=parseInt(params.get('item'));
  if(id&&items.find(x=>x.id===id)){
    setTimeout(()=>openDetail(id),300);
    // Wyczyść URL bez przeładowania
    history.replaceState(null,'',location.pathname);
  }
}

function showModal(html){document.getElementById('mbox').innerHTML=html;document.getElementById('modal').style.display='flex';setTimeout(refreshPos,30);}
function closeModal(){document.getElementById('modal').style.display='none';}
function overlayClick(e){
  // Celowo wyłączone — kliknięcie poza oknem NIE zamyka formularza
  // Zamknięcie tylko przez przycisk ✕ lub Escape
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.getElementById('modal').style.display!=='none')closeModal();});

// ── Boot ──────────────────────────────────────────────────────────────────────
(async function boot(){
  lsLoad();lsLoadContainers();
  try{const l=localStorage.getItem('garaz_layout');if(l)garageLayout=l;}catch(e){}
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  render();
  const saved=loadToken();
  try{
    const r=await fetch('/api/items',{headers:saved?{'Authorization':`Bearer ${saved}`}:{},signal:AbortSignal.timeout(2000)});
    if(r.status===401){document.getElementById('main-app').style.display='none';document.getElementById('login-screen').style.display='flex';return;}
    if(r.ok&&saved){
      authToken=saved;
      items=await r.json();
      nextId=Math.max(0,...items.map(x=>x.id))+1;
      await loadContainersFromServer();
      render();tryWS();
      handleItemLink();
    }
  }catch(e){}
  // Rejestracja PWA Service Worker
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  }
  // Obsługa skrótu ?action=add
  const params=new URLSearchParams(location.search);
  if(params.get('action')==='add'){setTimeout(()=>openAdd(null,null),400);}
})();
</script>
